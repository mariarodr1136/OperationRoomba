    walls:[
      {dir:'h', pos:960,  start:0,    end:4500, gaps:[{from:650,to:900},{from:2300,to:2550}]},

const WIN_THRESH = [0.80, 0.83, 0.87];

// ── Grid ──────────────────────────────────────────────────────────────────────
const ZOOM = 1.8;
const CELL = 20;
let MAP_W, MAP_H, gCols, gRows;
let dirty, cleaned;
let dirtyTotal = 0, dirtyClean = 0;
let mmCanvas, mmCtx, crtCanvas = null;

function initGrid() {
  const lv = LEVELS[currentLevel];
  MAP_W = lv.mapW; MAP_H = lv.mapH;
  gCols = Math.ceil(MAP_W / CELL); gRows = Math.ceil(MAP_H / CELL);
  dirty   = new Uint8Array(gCols * gRows);
  cleaned = new Uint8Array(gCols * gRows);
  dirtyTotal = 0; dirtyClean = 0;
  mmCanvas = document.createElement('canvas');
  mmCanvas.width = gCols; mmCanvas.height = gRows;
  mmCtx = mmCanvas.getContext('2d');
  mmCtx.fillStyle = '#0a0a1e'; mmCtx.fillRect(0, 0, gCols, gRows);
}

function generateDirt(density) {
  const clusters = Math.floor(gCols * gRows * density / 12);
  for (let i = 0; i < clusters; i++) {
    const cx = 2 + Math.floor(Math.random() * (gCols - 4));
    const cy = 2 + Math.floor(Math.random() * (gRows - 4));
    const r  = 1.2 + Math.random() * 2.8;
    for (let dy = -Math.ceil(r); dy <= Math.ceil(r); dy++) {
      for (let dx = -Math.ceil(r); dx <= Math.ceil(r); dx++) {
        if (dx*dx + dy*dy <= r*r) {
          const nx = cx+dx, ny = cy+dy;
          if (nx >= 0 && nx < gCols && ny >= 0 && ny < gRows && !dirty[ny*gCols+nx]) {
            dirty[ny*gCols+nx] = 1;
            dirtyTotal++;
            mmCtx.fillStyle = '#5a2e0a';
            mmCtx.fillRect(nx, ny, 1, 1);
          }
        }
      }
    }
  }
  clearDirtCircle(MAP_W/2, MAP_H/2, 80);
  clearDirtCircle(dock.x, dock.y, 60);
  extraDocks.forEach(d=>clearDirtCircle(d.x,d.y,60));
}

function clearDirtCircle(wx, wy, radius) {
  const x0 = Math.max(0, Math.floor((wx-radius)/CELL));
  const x1 = Math.min(gCols-1, Math.ceil((wx+radius)/CELL));
  const y0 = Math.max(0, Math.floor((wy-radius)/CELL));
  const y1 = Math.min(gRows-1, Math.ceil((wy+radius)/CELL));
  for (let cy=y0; cy<=y1; cy++) for (let cx=x0; cx<=x1; cx++) {
    const idx = cy*gCols+cx;
    if (dirty[idx]) { dirty[idx]=0; dirtyTotal--; mmCtx.fillStyle='#0a0a1e'; mmCtx.fillRect(cx,cy,1,1); }
  }
}

function generateWallRects() {
  wallRects = []; wallGaps = [];
  const T = 14;
  for (const w of (LEVELS[currentLevel].walls || [])) {
    const gaps = [...(w.gaps||[])].sort((a,b)=>a.from-b.from);
    let pos = w.start;
    for (const g of gaps) {
      if (g.from > pos) {
        const len = g.from - pos;
        if (w.dir==='v') wallRects.push({x:w.pos, y:pos+len/2, w:T, h:len});
        else             wallRects.push({x:pos+len/2, y:w.pos, w:len, h:T});
      }
      const gl = g.to - g.from;
      if (w.dir==='v') wallGaps.push({x:w.pos, y:g.from+gl/2, d:70});
      else             wallGaps.push({x:g.from+gl/2, y:w.pos, d:70});
      pos = g.to;
    }
    if (w.end > pos) {
      const len = w.end - pos;
      if (w.dir==='v') wallRects.push({x:w.pos, y:pos+len/2, w:T, h:len});
      else             wallRects.push({x:pos+len/2, y:w.pos, w:len, h:T});
    }
  }
}

function clearDirtRect(rx, ry, rw, rh) {
  const x0=Math.max(0,Math.floor((rx-rw/2-CELL)/CELL)), x1=Math.min(gCols-1,Math.ceil((rx+rw/2+CELL)/CELL));
  const y0=Math.max(0,Math.floor((ry-rh/2-CELL)/CELL)), y1=Math.min(gRows-1,Math.ceil((ry+rh/2+CELL)/CELL));
  for (let cy=y0;cy<=y1;cy++) for (let cx=x0;cx<=x1;cx++) {
    const idx=cy*gCols+cx;
    if (dirty[idx]) { dirty[idx]=0; dirtyTotal--; mmCtx.fillStyle='#050514'; mmCtx.fillRect(cx,cy,1,1); }
  }
}

function markCleaned(wx, wy, radius) {
  const x0=Math.max(0,Math.floor((wx-radius)/CELL)), x1=Math.min(gCols-1,Math.floor((wx+radius)/CELL));
  const y0=Math.max(0,Math.floor((wy-radius)/CELL)), y1=Math.min(gRows-1,Math.floor((wy+radius)/CELL));
  let newCells = 0;
  for (let cy=y0; cy<=y1; cy++) for (let cx=x0; cx<=x1; cx++) {
    const idx = cy*gCols+cx;
    if (!cleaned[idx]) {
      const dx=cx*CELL+CELL/2-wx, dy=cy*CELL+CELL/2-wy;
      if (dx*dx+dy*dy <= radius*radius) {
        cleaned[idx] = 1;
        if (dirty[idx]) { dirtyClean++; newCells++; }
        mmCtx.fillStyle = '#0e2a42'; mmCtx.fillRect(cx, cy, 1, 1);
      }
    }
  }
  return newCells;
}

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx;
let muted = false;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
function beep(freq,endFreq,dur,type='square',vol=0.3) {
  if (muted || !audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination); o.type=type;
  o.frequency.setValueAtTime(freq,audioCtx.currentTime);
  if (endFreq!==freq) o.frequency.exponentialRampToValueAtTime(endFreq,audioCtx.currentTime+dur);
  g.gain.setValueAtTime(vol,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.start(); o.stop(audioCtx.currentTime+dur);
}
function playNoise(dur=0.25,vol=0.9) {
  if (muted || !audioCtx) return;
  const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*dur),audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.04));
  const src=audioCtx.createBufferSource(), g=audioCtx.createGain();
  src.buffer=buf; src.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(vol,audioCtx.currentTime); src.start();
}
function playLego()    { playNoise(0.25,0.9); }
function playCatHiss() { beep(380,160,0.4,'sawtooth',0.4); }
function playDog()     { beep(200,80,0.3,'sawtooth',0.5); }
function playLevelUp() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,f,0.15,'square',0.3),i*120)); }
function playHum()     { beep(85,75,0.4,'sawtooth',0.04); }
function playPickup()  { beep(440,880,0.12,'square',0.25); }
function playOwner()   { beep(60,40,1.2,'sawtooth',0.6); }
function playCharge()  { beep(300,600,0.08,'sine',0.08); }
function playCombo(n)  { beep(300+n*80,500+n*80,0.1,'square',0.2); }
function playAlarm()      { beep(880,440,0.15,'square',0.4); }
function playLowBattery(u){ const f=260+u*540; beep(f,f*1.4,0.09,'square',0.11+u*0.22); }
function playCord()       { beep(95,60,0.28,'sawtooth',0.18); }
function playStart()   { [220,330,440].forEach((f,i)=>setTimeout(()=>beep(f,f*1.5,0.1,'square',0.2),i*80)); }
function playBabyMon() { beep(1100,700,0.12,'sine',0.18); }
function playMenuOpen()    { beep(600,300,0.15,'sawtooth',0.2); }
function playMenuConfirm() { beep(220,110,0.22,'sawtooth',0.28); }
function playMenuCancel()  { beep(380,560,0.1,'square',0.18); }
function playPause()       { [440,330].forEach((f,i)=>setTimeout(()=>beep(f,f,0.09,'square',0.18),i*75)); }
function playResume()      { [330,440].forEach((f,i)=>setTimeout(()=>beep(f,f,0.09,'square',0.18),i*75)); }

// ── Game state ────────────────────────────────────────────────────────────────
let state = 'start';
let currentLevel = 0;
let paused = false;
let quitConfirm = false;
let _quitBtnRect = null, _confirmYesRect = null, _confirmNoRect = null;
let mouseX = -1, mouseY = -1;
let highScore = parseInt(localStorage.getItem('roomba_hs') || '0');
let muteBtnX = 0;
let lives = 3, frame = 0, timeLeft = 0, humTimer = 0;
let score = 0, carryScore = 0, combo = 1, comboTimer = 0;
let battery = 100, noise = 0;
let ownerWarning = false, ownerTimer = 0;
let shakeX = 0, shakeY = 0, shakeDamp = 0;
let activeBoost = 0, activeMega = 0, activeHush = 0, activeShield = 0;
let cords = [];
let cordStuckVx = 0, cordStuckVy = 0;
let wallRects = [], wallGaps = [];
let swipeOrigin = null;
let wetSpots = [], pawPrints = [], celebParticles = [];
let maxCleared = parseInt(localStorage.getItem('roomba_max_cleared')||'0');
let _levelSelectBtns = [];

function saveHighScore() {
  const total=carryScore+score;
  if (total>highScore) { highScore=total; localStorage.setItem('roomba_hs',highScore); }
}

// ── Camera ────────────────────────────────────────────────────────────────────
let camX = 0, camY = 0;
function updateCamera() {
  const vw=W/ZOOM, vh=H/ZOOM;
  const tx = roomba.x-vw/2, ty = roomba.y-vh/2;
  camX = MAP_W<=vw ? -Math.floor((vw-MAP_W)/2) : Math.max(0,Math.min(MAP_W-vw,tx));
  camY = MAP_H<=vh ? -Math.floor((vh-MAP_H)/2) : Math.max(0,Math.min(MAP_H-vh,ty));
}

// ── Roomba ────────────────────────────────────────────────────────────────────
const R = 26;
const roomba = { x:0,y:0,vx:0,vy:0,angle:0,stuckTimer:0,hitTimer:0,bumpX:0,bumpY:0 };

// ── Objects ───────────────────────────────────────────────────────────────────
let dock = { x:0, y:0 };
let extraDocks = [];
let furniture = [], legos = [], cats = [], dogs = [], powerups = [], dust = [], popups = [];
let babyMonitors = [];
let bursts = [];

// ── Input ─────────────────────────────────────────────────────────────────────
const keys = {};
const vkeys = { up:false, down:false, left:false, right:false };

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code==='Space') e.preventDefault();
  if (e.code==='KeyP'||e.code==='Escape') {
    if (state==='playing') {
      if (quitConfirm) { quitConfirm=false; }
      else { paused=!paused; initAudio(); if (paused) playPause(); else playResume(); }
    }
    return;
  }
  if (e.code==='KeyM') { muted=!muted; return; }
  if (!['Space','Enter'].includes(e.code)) return;
  initAudio();
  if (state==='playing' && paused)  { if (quitConfirm) { quitConfirm=false; } else { paused=false; playResume(); } return; }
  if (state==='playing' && !paused) { paused=true; playPause(); return; }
  if (state==='start')              startGame();
  else if (state==='gameover')      startLevel();
  else if (state==='levelcomplete') nextLevel();
  else if (state==='win')           { state='start'; }
});
document.addEventListener('keyup', e => { keys[e.code]=false; });
canvas.addEventListener('mousemove', e => {
  const rect=canvas.getBoundingClientRect();
  mouseX=(e.clientX-rect.left)*(W/rect.width);
  mouseY=(e.clientY-rect.top)*(H/rect.height);
  const inBtn = r => r&&mouseX>=r.x&&mouseX<=r.x+r.w&&mouseY>=r.y&&mouseY<=r.y+r.h;
  const hovering = state==='playing'&&paused&&(inBtn(_quitBtnRect)||inBtn(_confirmYesRect)||inBtn(_confirmNoRect));
  const hoveringStart = state==='start'&&_levelSelectBtns.some(b=>mouseX>=b.x&&mouseX<=b.x+b.w&&mouseY>=b.y&&mouseY<=b.y+b.h);
  canvas.style.cursor = (hovering||hoveringStart) ? 'pointer' : 'default';
});
canvas.addEventListener('mouseleave', () => { mouseX=-1; mouseY=-1; canvas.style.cursor='default'; });
window.addEventListener('resize', () => {
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=W; canvas.height=H;
  crtCanvas=null;
  if (state==='playing') updateCamera();
});

// Canvas click — mute button + pause overlay buttons + start screen
canvas.addEventListener('click', e => {
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  if (mx>=muteBtnX&&my>=5&&my<=32) { muted=!muted; initAudio(); return; }
  if (state==='playing' && paused) {
    if (quitConfirm) {
      if (_confirmYesRect&&mx>=_confirmYesRect.x&&mx<=_confirmYesRect.x+_confirmYesRect.w&&my>=_confirmYesRect.y&&my<=_confirmYesRect.y+_confirmYesRect.h) { playMenuConfirm(); quitConfirm=false; paused=false; state='start'; return; }
      if (_confirmNoRect&&mx>=_confirmNoRect.x&&mx<=_confirmNoRect.x+_confirmNoRect.w&&my>=_confirmNoRect.y&&my<=_confirmNoRect.y+_confirmNoRect.h) { playMenuCancel(); quitConfirm=false; return; }
    } else {
      if (_quitBtnRect&&mx>=_quitBtnRect.x&&mx<=_quitBtnRect.x+_quitBtnRect.w&&my>=_quitBtnRect.y&&my<=_quitBtnRect.y+_quitBtnRect.h) { playMenuOpen(); quitConfirm=true; return; }
    }
    return;
  }
  if (state==='start') {
    initAudio();
    const btn=_levelSelectBtns.find(b=>mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h);
    if (btn) { carryScore=0; currentLevel=btn.level; startLevel(); return; }
    startGame();
  }
});


// ── Touch D-pad ───────────────────────────────────────────────────────────────
function getDpadLayout() {
  const ps=Math.min(W,H)*0.11;
  return { ps, cx:W-ps*2-20, cy:H-ps*2-20 };
}

function isOnDpad(tx,ty) {
  const {ps,cx,cy}=getDpadLayout();
  return tx>=cx-ps*2&&tx<=cx+ps*2&&ty>=cy-ps*2&&ty<=cy+ps*2;
}

function applyTouchToDpad(tx,ty) {
  const {ps,cx,cy}=getDpadLayout();
  if (tx>=cx-ps*1.5&&tx<cx-ps*0.5&&ty>=cy-ps*0.5&&ty<cy+ps*0.5) vkeys.left=true;
  if (tx>=cx+ps*0.5&&tx<cx+ps*1.5&&ty>=cy-ps*0.5&&ty<cy+ps*0.5) vkeys.right=true;
  if (tx>=cx-ps*0.5&&tx<cx+ps*0.5&&ty>=cy-ps*1.5&&ty<cy-ps*0.5) vkeys.up=true;
  if (tx>=cx-ps*0.5&&tx<cx+ps*0.5&&ty>=cy+ps*0.5&&ty<cy+ps*1.5) vkeys.down=true;
}

function getTouchPos(t) {
  const rect=canvas.getBoundingClientRect();
  return [(t.clientX-rect.left)*(W/rect.width),(t.clientY-rect.top)*(H/rect.height)];
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  const rect=canvas.getBoundingClientRect();
  for (const t of e.changedTouches) {
    const [tx,ty]=getTouchPos(t);
    if (tx>=muteBtnX&&ty>=5&&ty<=32) { muted=!muted; return; }
  }
  if (state!=='playing') {
    if (state==='start') {
      for (const t of e.changedTouches) {
        const [tx,ty]=getTouchPos(t);
        const btn=_levelSelectBtns.find(b=>tx>=b.x&&tx<=b.x+b.w&&ty>=b.y&&ty<=b.y+b.h);
        if (btn) { initAudio(); carryScore=0; currentLevel=btn.level; startLevel(); return; }
      }
      startGame();
    }
    else if (state==='gameover')      startLevel();
    else if (state==='levelcomplete') nextLevel();
    else if (state==='win')           { state='start'; }
    return;
  }
  if (paused) {
    if (quitConfirm) {
      for (const t of e.changedTouches) {
        const [tx,ty]=getTouchPos(t);
        if (_confirmYesRect&&tx>=_confirmYesRect.x&&tx<=_confirmYesRect.x+_confirmYesRect.w&&ty>=_confirmYesRect.y&&ty<=_confirmYesRect.y+_confirmYesRect.h) { playMenuConfirm(); quitConfirm=false; paused=false; state='start'; return; }
        if (_confirmNoRect&&tx>=_confirmNoRect.x&&tx<=_confirmNoRect.x+_confirmNoRect.w&&ty>=_confirmNoRect.y&&ty<=_confirmNoRect.y+_confirmNoRect.h) { playMenuCancel(); quitConfirm=false; return; }
      }
      return;
    }
    for (const t of e.changedTouches) {
      const [tx,ty]=getTouchPos(t);
      if (_quitBtnRect&&tx>=_quitBtnRect.x&&tx<=_quitBtnRect.x+_quitBtnRect.w&&ty>=_quitBtnRect.y&&ty<=_quitBtnRect.y+_quitBtnRect.h) { playMenuOpen(); quitConfirm=true; return; }
    }
    paused=false; playResume(); return;
  }
  vkeys.left=vkeys.right=vkeys.up=vkeys.down=false;
  swipeOrigin=null;
  for (const t of e.changedTouches) {
    const [tx,ty]=getTouchPos(t);
    if (!isOnDpad(tx,ty)) { swipeOrigin={x:tx,y:ty,id:t.identifier}; break; }
  }
  Array.from(e.touches).forEach(t => { const [tx,ty]=getTouchPos(t); applyTouchToDpad(tx,ty); });
},{passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state!=='playing'||paused) return;
  vkeys.left=vkeys.right=vkeys.up=vkeys.down=false;
  Array.from(e.touches).forEach(t => {
    const [tx,ty]=getTouchPos(t);
    if (swipeOrigin&&t.identifier===swipeOrigin.id) {
      const dx=tx-swipeOrigin.x, dy=ty-swipeOrigin.y;
      if (Math.sqrt(dx*dx+dy*dy)>22) {
        if (Math.abs(dx)>=Math.abs(dy)) { vkeys.right=dx>0; vkeys.left=dx<0; }
        else { vkeys.down=dy>0; vkeys.up=dy<0; }
      }
    } else { applyTouchToDpad(tx,ty); }
  });
},{passive:false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (swipeOrigin&&t.identifier===swipeOrigin.id) swipeOrigin=null;
  }
  if (e.touches.length===0) vkeys.left=vkeys.right=vkeys.up=vkeys.down=false;
},{passive:false});

// ── Spawn helpers ─────────────────────────────────────────────────────────────
const CORD_COLORS=[
  {main:'#c85a00',hi:'#e8741a',plug:'#6a3400'},  // orange power
  {main:'#d4d4d4',hi:'#ffffff',plug:'#888888'},  // white charger
  {main:'#1a1a1a',hi:'#3a3a3a',plug:'#0a0a0a'},  // black HDMI

];
const LEGO_COLORS=['#dd1111','#1144dd','#ddaa00','#118833','#cc3399','#ee6600','#1188aa'];
const FURN_TYPES=[
  {w:120,h:58, c:'#3d2810',r:'#2a1a08', type:'table'},
  {w:38, h:38, c:'#2e1f10',r:'#1e1208', type:'stool'},
