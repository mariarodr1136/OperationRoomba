<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>OPERATION ROOMBA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000008; overflow: hidden; touch-action: none; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;

// ── Levels ────────────────────────────────────────────────────────────────────
const LEVELS = [
  { mapW:900,  mapH:600,  dirt:0.52, furn:6,  legos:20,  socks:4,  cats:1, dogs:1, pups:2, bmons:2, timeS:140, name:'The Kitchen'    },
  { mapW:1500, mapH:980,  dirt:0.50, furn:11, legos:38,  socks:7,  cats:2, dogs:2, pups:2, bmons:3, timeS:190, name:'The Living Room' },
  { mapW:2400, mapH:1540, dirt:0.48, furn:20, legos:64,  socks:10, cats:3, dogs:3, pups:3, bmons:3, timeS:260, name:'The Hallway'     },
  { mapW:3300, mapH:2100, dirt:0.45, furn:30, legos:100, socks:14, cats:5, dogs:4, pups:4, bmons:4, timeS:340, name:'The Bedroom'     },
  { mapW:4500, mapH:2900, dirt:0.42, furn:44, legos:150, socks:20, cats:7, dogs:6, pups:5, bmons:5, timeS:440, name:'The Whole House' },
];

// ── Grid ──────────────────────────────────────────────────────────────────────
const ZOOM = 1.8;
const CELL = 20;
let MAP_W, MAP_H, gCols, gRows;
let dirty, cleaned;
let dirtyTotal = 0, dirtyClean = 0;
let mmCanvas, mmCtx;

function initGrid() {
  const lv = LEVELS[currentLevel];
  MAP_W = lv.mapW; MAP_H = lv.mapH;
  gCols = Math.ceil(MAP_W / CELL); gRows = Math.ceil(MAP_H / CELL);
  dirty   = new Uint8Array(gCols * gRows);
  cleaned = new Uint8Array(gCols * gRows);
  dirtyTotal = 0; dirtyClean = 0;
  mmCanvas = document.createElement('canvas');
  mmCanvas.width = gCols; mmCanvas.height = gRows;
  mmCtx = mmCanvas.getContext('2d');
  mmCtx.fillStyle = '#0a0a1e'; mmCtx.fillRect(0, 0, gCols, gRows);
}

function generateDirt(density) {
  const clusters = Math.floor(gCols * gRows * density / 12);
  for (let i = 0; i < clusters; i++) {
    const cx = 2 + Math.floor(Math.random() * (gCols - 4));
    const cy = 2 + Math.floor(Math.random() * (gRows - 4));
    const r  = 1.2 + Math.random() * 2.8;
    for (let dy = -Math.ceil(r); dy <= Math.ceil(r); dy++) {
      for (let dx = -Math.ceil(r); dx <= Math.ceil(r); dx++) {
        if (dx*dx + dy*dy <= r*r) {
          const nx = cx+dx, ny = cy+dy;
          if (nx >= 0 && nx < gCols && ny >= 0 && ny < gRows && !dirty[ny*gCols+nx]) {
            dirty[ny*gCols+nx] = 1;
            dirtyTotal++;
            mmCtx.fillStyle = '#2a1a08';
            mmCtx.fillRect(nx, ny, 1, 1);
          }
        }
      }
    }
  }
  clearDirtCircle(MAP_W/2, MAP_H/2, 80);
  clearDirtCircle(dock.x, dock.y, 60);
}

function clearDirtCircle(wx, wy, radius) {
  const x0 = Math.max(0, Math.floor((wx-radius)/CELL));
  const x1 = Math.min(gCols-1, Math.ceil((wx+radius)/CELL));
  const y0 = Math.max(0, Math.floor((wy-radius)/CELL));
  const y1 = Math.min(gRows-1, Math.ceil((wy+radius)/CELL));
  for (let cy=y0; cy<=y1; cy++) for (let cx=x0; cx<=x1; cx++) {
    const idx = cy*gCols+cx;
    if (dirty[idx]) { dirty[idx]=0; dirtyTotal--; mmCtx.fillStyle='#0a0a1e'; mmCtx.fillRect(cx,cy,1,1); }
  }
}

function clearDirtRect(rx, ry, rw, rh) {
  const x0=Math.max(0,Math.floor((rx-rw/2-CELL)/CELL)), x1=Math.min(gCols-1,Math.ceil((rx+rw/2+CELL)/CELL));
  const y0=Math.max(0,Math.floor((ry-rh/2-CELL)/CELL)), y1=Math.min(gRows-1,Math.ceil((ry+rh/2+CELL)/CELL));
  for (let cy=y0;cy<=y1;cy++) for (let cx=x0;cx<=x1;cx++) {
    const idx=cy*gCols+cx;
    if (dirty[idx]) { dirty[idx]=0; dirtyTotal--; mmCtx.fillStyle='#0a0a1e'; mmCtx.fillRect(cx,cy,1,1); }
  }
}

function markCleaned(wx, wy, radius) {
  const x0=Math.max(0,Math.floor((wx-radius)/CELL)), x1=Math.min(gCols-1,Math.floor((wx+radius)/CELL));
  const y0=Math.max(0,Math.floor((wy-radius)/CELL)), y1=Math.min(gRows-1,Math.floor((wy+radius)/CELL));
  let newCells = 0;
  for (let cy=y0; cy<=y1; cy++) for (let cx=x0; cx<=x1; cx++) {
    const idx = cy*gCols+cx;
    if (!cleaned[idx]) {
      const dx=cx*CELL+CELL/2-wx, dy=cy*CELL+CELL/2-wy;
      if (dx*dx+dy*dy <= radius*radius) {
        cleaned[idx] = 1;
        if (dirty[idx]) { dirtyClean++; newCells++; }
        mmCtx.fillStyle = '#1e1e3e'; mmCtx.fillRect(cx, cy, 1, 1);
      }
    }
  }
  return newCells;
}

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx;
let muted = false;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
function beep(freq,endFreq,dur,type='square',vol=0.3) {
  if (muted || !audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination); o.type=type;
  o.frequency.setValueAtTime(freq,audioCtx.currentTime);
  if (endFreq!==freq) o.frequency.exponentialRampToValueAtTime(endFreq,audioCtx.currentTime+dur);
  g.gain.setValueAtTime(vol,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.start(); o.stop(audioCtx.currentTime+dur);
}
function playNoise(dur=0.25,vol=0.9) {
  if (muted || !audioCtx) return;
  const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*dur),audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.04));
  const src=audioCtx.createBufferSource(), g=audioCtx.createGain();
  src.buffer=buf; src.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(vol,audioCtx.currentTime); src.start();
}
function playLego()    { playNoise(0.25,0.9); }
function playSock()    { beep(120,80,0.15,'sine',0.15); }
function playCatHiss() { beep(380,160,0.4,'sawtooth',0.4); }
function playDog()     { beep(200,80,0.3,'sawtooth',0.5); }
function playLevelUp() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,f,0.15,'square',0.3),i*120)); }
function playHum()     { beep(85,75,0.4,'sawtooth',0.04); }
function playPickup()  { beep(440,880,0.12,'square',0.25); }
function playOwner()   { beep(60,40,1.2,'sawtooth',0.6); }
function playCharge()  { beep(300,600,0.08,'sine',0.08); }
function playCombo(n)  { beep(300+n*80,500+n*80,0.1,'square',0.2); }
function playAlarm()   { beep(880,440,0.15,'square',0.4); }
function playStart()   { [220,330,440].forEach((f,i)=>setTimeout(()=>beep(f,f*1.5,0.1,'square',0.2),i*80)); }
function playBabyMon() { beep(1100,700,0.12,'sine',0.18); }
function playMenuOpen()    { beep(600,300,0.15,'sawtooth',0.2); }
function playMenuConfirm() { beep(220,110,0.22,'sawtooth',0.28); }
function playMenuCancel()  { beep(380,560,0.1,'square',0.18); }
function playPause()       { [440,330].forEach((f,i)=>setTimeout(()=>beep(f,f,0.09,'square',0.18),i*75)); }
function playResume()      { [330,440].forEach((f,i)=>setTimeout(()=>beep(f,f,0.09,'square',0.18),i*75)); }

// ── Game state ────────────────────────────────────────────────────────────────
let state = 'start';
let currentLevel = 0;
let paused = false;
let quitConfirm = false;
let _quitBtnRect = null, _confirmYesRect = null, _confirmNoRect = null;
let mouseX = -1, mouseY = -1;
let highScore = parseInt(localStorage.getItem('roomba_hs') || '0');
let muteBtnX = 0;
let lives = 3, frame = 0, timeLeft = 0, humTimer = 0;
let score = 0, combo = 1, comboTimer = 0;
let battery = 100, noise = 0;
let ownerWarning = false, ownerTimer = 0;
let shakeX = 0, shakeY = 0, shakeDamp = 0;
let activeBoost = 0, activeMega = 0, activeHush = 0;

function saveHighScore() {
  if (score > highScore) { highScore = score; localStorage.setItem('roomba_hs', highScore); }
}

// ── Camera ────────────────────────────────────────────────────────────────────
let camX = 0, camY = 0;
function updateCamera() {
  const vw=W/ZOOM, vh=H/ZOOM;
  const tx = roomba.x-vw/2, ty = roomba.y-vh/2;
  camX = MAP_W<=vw ? -Math.floor((vw-MAP_W)/2) : Math.max(0,Math.min(MAP_W-vw,tx));
  camY = MAP_H<=vh ? -Math.floor((vh-MAP_H)/2) : Math.max(0,Math.min(MAP_H-vh,ty));
}

// ── Roomba ────────────────────────────────────────────────────────────────────
const R = 26;
const roomba = { x:0,y:0,vx:0,vy:0,angle:0,stuckTimer:0,hitTimer:0,bumpX:0,bumpY:0 };

// ── Objects ───────────────────────────────────────────────────────────────────
let dock = { x:0, y:0 };
let furniture = [], legos = [], socks = [], cats = [], dogs = [], powerups = [], dust = [], popups = [];
let babyMonitors = [];
let bursts = [];

// ── Input ─────────────────────────────────────────────────────────────────────
const keys = {};
const vkeys = { up:false, down:false, left:false, right:false };

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code==='Space') e.preventDefault();
  if (e.code==='KeyP'||e.code==='Escape') {
    if (state==='playing') {
      if (quitConfirm) { quitConfirm=false; }
      else { paused=!paused; initAudio(); if (paused) playPause(); else playResume(); }
    }
    return;
  }
  if (e.code==='KeyM') { muted=!muted; return; }
  if (!['Space','Enter'].includes(e.code)) return;
  initAudio();
  if (state==='playing' && paused)  { if (quitConfirm) { quitConfirm=false; } else { paused=false; playResume(); } return; }
  if (state==='playing' && !paused) { paused=true; playPause(); return; }
  if (state==='start')              startGame();
  else if (state==='gameover')      startLevel();
  else if (state==='levelcomplete') nextLevel();
  else if (state==='win')           { state='start'; }
});
document.addEventListener('keyup', e => { keys[e.code]=false; });
canvas.addEventListener('mousemove', e => {
  const rect=canvas.getBoundingClientRect();
  mouseX=(e.clientX-rect.left)*(W/rect.width);
  mouseY=(e.clientY-rect.top)*(H/rect.height);
  const inBtn = r => r&&mouseX>=r.x&&mouseX<=r.x+r.w&&mouseY>=r.y&&mouseY<=r.y+r.h;
  const hovering = state==='playing'&&paused&&(inBtn(_quitBtnRect)||inBtn(_confirmYesRect)||inBtn(_confirmNoRect));
  canvas.style.cursor = hovering ? 'pointer' : 'default';
});
canvas.addEventListener('mouseleave', () => { mouseX=-1; mouseY=-1; canvas.style.cursor='default'; });
window.addEventListener('resize', () => {
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=W; canvas.height=H;
  if (state==='playing') updateCamera();
});

// Canvas click — mute button + pause overlay buttons + start screen
canvas.addEventListener('click', e => {
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  if (mx>=muteBtnX&&my>=5&&my<=32) { muted=!muted; initAudio(); return; }
  if (state==='playing' && paused) {
    if (quitConfirm) {
      if (_confirmYesRect&&mx>=_confirmYesRect.x&&mx<=_confirmYesRect.x+_confirmYesRect.w&&my>=_confirmYesRect.y&&my<=_confirmYesRect.y+_confirmYesRect.h) { playMenuConfirm(); quitConfirm=false; paused=false; state='start'; return; }
      if (_confirmNoRect&&mx>=_confirmNoRect.x&&mx<=_confirmNoRect.x+_confirmNoRect.w&&my>=_confirmNoRect.y&&my<=_confirmNoRect.y+_confirmNoRect.h) { playMenuCancel(); quitConfirm=false; return; }
    } else {
      if (_quitBtnRect&&mx>=_quitBtnRect.x&&mx<=_quitBtnRect.x+_quitBtnRect.w&&my>=_quitBtnRect.y&&my<=_quitBtnRect.y+_quitBtnRect.h) { playMenuOpen(); quitConfirm=true; return; }
    }
    return;
  }
  if (state==='start') { initAudio(); startGame(); }
});


// ── Touch D-pad ───────────────────────────────────────────────────────────────
function getDpadLayout() {
  const ps=Math.min(W,H)*0.11;
  return { ps, cx:W-ps*2-20, cy:H-ps*2-20 };
}

function applyTouchToDpad(tx,ty) {
  const {ps,cx,cy}=getDpadLayout();
  if (tx>=cx-ps*1.5&&tx<cx-ps*0.5&&ty>=cy-ps*0.5&&ty<cy+ps*0.5) vkeys.left=true;
  if (tx>=cx+ps*0.5&&tx<cx+ps*1.5&&ty>=cy-ps*0.5&&ty<cy+ps*0.5) vkeys.right=true;
  if (tx>=cx-ps*0.5&&tx<cx+ps*0.5&&ty>=cy-ps*1.5&&ty<cy-ps*0.5) vkeys.up=true;
  if (tx>=cx-ps*0.5&&tx<cx+ps*0.5&&ty>=cy+ps*0.5&&ty<cy+ps*1.5) vkeys.down=true;
}

function getTouchPos(t) {
  const rect=canvas.getBoundingClientRect();
  return [(t.clientX-rect.left)*(W/rect.width),(t.clientY-rect.top)*(H/rect.height)];
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  const rect=canvas.getBoundingClientRect();
  for (const t of e.changedTouches) {
    const [tx,ty]=getTouchPos(t);
    if (tx>=muteBtnX&&ty>=5&&ty<=32) { muted=!muted; return; }
  }
  if (state!=='playing') {
    if (state==='start') { startGame(); }
    else if (state==='gameover')      startLevel();
    else if (state==='levelcomplete') nextLevel();
    else if (state==='win')           { state='start'; }
    return;
  }
  if (paused) {
    if (quitConfirm) {
      for (const t of e.changedTouches) {
        const [tx,ty]=getTouchPos(t);
        if (_confirmYesRect&&tx>=_confirmYesRect.x&&tx<=_confirmYesRect.x+_confirmYesRect.w&&ty>=_confirmYesRect.y&&ty<=_confirmYesRect.y+_confirmYesRect.h) { playMenuConfirm(); quitConfirm=false; paused=false; state='start'; return; }
        if (_confirmNoRect&&tx>=_confirmNoRect.x&&tx<=_confirmNoRect.x+_confirmNoRect.w&&ty>=_confirmNoRect.y&&ty<=_confirmNoRect.y+_confirmNoRect.h) { playMenuCancel(); quitConfirm=false; return; }
      }
      return;
    }
    for (const t of e.changedTouches) {
      const [tx,ty]=getTouchPos(t);
      if (_quitBtnRect&&tx>=_quitBtnRect.x&&tx<=_quitBtnRect.x+_quitBtnRect.w&&ty>=_quitBtnRect.y&&ty<=_quitBtnRect.y+_quitBtnRect.h) { playMenuOpen(); quitConfirm=true; return; }
    }
    paused=false; playResume(); return;
  }
  vkeys.left=vkeys.right=vkeys.up=vkeys.down=false;
  Array.from(e.touches).forEach(t => { const [tx,ty]=getTouchPos(t); applyTouchToDpad(tx,ty); });
},{passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state!=='playing'||paused) return;
  vkeys.left=vkeys.right=vkeys.up=vkeys.down=false;
  Array.from(e.touches).forEach(t => { const [tx,ty]=getTouchPos(t); applyTouchToDpad(tx,ty); });
},{passive:false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.touches.length===0) vkeys.left=vkeys.right=vkeys.up=vkeys.down=false;
},{passive:false});

// ── Spawn helpers ─────────────────────────────────────────────────────────────
const LEGO_COLORS=['#3a1010','#3a2808','#082218','#3a2a06','#081830','#3a1c08','#083030'];
const FURN_TYPES=[
  {w:120,h:58, c:'#3d2810',r:'#2a1a08'},
  {w:38, h:38, c:'#2e1f10',r:'#1e1208'},
  {w:170,h:50, c:'#1e3040',r:'#0e1e2a'},
  {w:150,h:90, c:'#1a2e1a',r:'#0e1e0e'},
  {w:100,h:48, c:'#3a2a18',r:'#281a0a'},
  {w:55, h:55, c:'#20182a',r:'#140e18'},
];

function tryPlace(x,y,used,minD) {
  return used.every(u=>{ const dx=u.x-x,dy=u.y-y; return dx*dx+dy*dy>(minD||u.d||80)**2; });
}

function spawnFurniture(count) {
  furniture=[];
  const used=[{x:MAP_W/2,y:MAP_H/2,d:130},{x:dock.x,y:dock.y,d:100}];
  for (let i=0;i<count;i++) {
    const t=FURN_TYPES[Math.floor(Math.random()*FURN_TYPES.length)];
    for (let a=0;a<120;a++) {
      const x=t.w/2+20+Math.random()*(MAP_W-t.w-40);
      const y=t.h/2+20+Math.random()*(MAP_H-t.h-40);
      const minD=Math.max(t.w,t.h)/2+25;
      if (tryPlace(x,y,used,minD)) {
        furniture.push({x,y,w:t.w,h:t.h,c:t.c,r:t.r});
        used.push({x,y,d:minD}); break;
      }
    }
  }
}

function spawnObstacles() {
  legos=[]; socks=[]; cats=[]; dogs=[]; powerups=[]; babyMonitors=[];
  const lv=LEVELS[currentLevel];
  const used=[{x:MAP_W/2,y:MAP_H/2,d:130},{x:dock.x,y:dock.y,d:80}];
  furniture.forEach(f=>used.push({x:f.x,y:f.y,d:Math.max(f.w,f.h)/2+20}));
  const rand=(lo,hi)=>lo+Math.random()*(hi-lo);

  for (let i=0;i<lv.cats;i++) for (let t=0;t<100;t++) {
    const x=rand(80,MAP_W-80),y=rand(80,MAP_H-80);
    if (tryPlace(x,y,used,180)) { cats.push({x,y,w:72,h:46,sleeping:true,awakeTimer:0,restAngle:rand(0,Math.PI*2),randomWakeTimer:Math.floor(rand(420,780)),patrolX:rand(80,MAP_W-80),patrolY:rand(80,MAP_H-80)}); used.push({x,y,d:80}); break; }
  }
  for (let i=0;i<lv.dogs;i++) for (let t=0;t<100;t++) {
    const x=rand(80,MAP_W-80),y=rand(80,MAP_H-80);
    if (tryPlace(x,y,used,200)) {
      const ang=Math.random()*Math.PI*2, spd=2.8;
      dogs.push({x,y,r:18,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,dirTimer:60,bark:0});
      used.push({x,y,d:80}); break;
    }
  }
  for (let i=0;i<lv.socks;i++) for (let t=0;t<80;t++) {
    const x=rand(50,MAP_W-50),y=rand(50,MAP_H-50);
    if (tryPlace(x,y,used,80)) { socks.push({x,y,angle:rand(0,Math.PI),color:['#888','#aaa','#556','#785'][i%4],variant:1+i%2}); used.push({x,y,d:50}); break; }
  }
  for (let i=0;i<lv.legos;i++) for (let t=0;t<50;t++) {
    const x=rand(25,MAP_W-25),y=rand(25,MAP_H-25);
    if (tryPlace(x,y,used,36)) { legos.push({x,y,color:LEGO_COLORS[i%LEGO_COLORS.length],hit:false,variant:i%3}); used.push({x,y,d:30}); break; }
  }
  const PUP_TYPES=[{sym:'B',color:'#ffcc00',effect:'boost'},{sym:'M',color:'#44aaff',effect:'mega'},{sym:'H',color:'#44ff88',effect:'hush'}];
  for (let i=0;i<lv.pups;i++) for (let t=0;t<60;t++) {
    const x=rand(50,MAP_W-50),y=rand(50,MAP_H-50);
    if (tryPlace(x,y,used,80)) { const tp=PUP_TYPES[i%3]; powerups.push({x,y,sym:tp.sym,color:tp.color,effect:tp.effect,collected:false}); used.push({x,y,d:50}); break; }
  }
  for (let i=0;i<lv.bmons;i++) for (let t=0;t<60;t++) {
    const x=rand(80,MAP_W-80),y=rand(80,MAP_H-80);
    if (tryPlace(x,y,used,130)) { babyMonitors.push({x,y,active:false,beepTimer:0}); used.push({x,y,d:100}); break; }
  }
}

function startLevel() {
  const lv=LEVELS[currentLevel];
  dock={x:60,y:60};
  initGrid();
  spawnFurniture(lv.furn);
  generateDirt(lv.dirt);
  furniture.forEach(f=>clearDirtRect(f.x,f.y,f.w,f.h));
  spawnObstacles();
  lives=3; frame=0; timeLeft=Math.round(lv.timeS*60*0.65); humTimer=0;
  score=0; combo=1; comboTimer=0;
  battery=100; noise=0; ownerWarning=false; ownerTimer=0;
  shakeX=0; shakeY=0; shakeDamp=0;
  activeBoost=0; activeMega=0; activeHush=0;
  roomba.x=MAP_W/2; roomba.y=MAP_H/2;
  roomba.vx=0; roomba.vy=0; roomba.angle=0;
  roomba.stuckTimer=0; roomba.hitTimer=0; roomba.bumpX=0; roomba.bumpY=0;
  dust=[]; popups=[]; bursts=[];
  paused=false; quitConfirm=false;
  updateCamera();
  state='playing';
}
function startGame() { playStart(); currentLevel=0; startLevel(); }
function nextLevel()  { currentLevel=Math.min(currentLevel+1,LEVELS.length-1); startLevel(); }

function shake(amt) { shakeX=(Math.random()-.5)*amt*2; shakeY=(Math.random()-.5)*amt*2; shakeDamp=amt; }
function addPopup(wx,wy,text,color) { popups.push({x:(wx-camX)*ZOOM,y:(wy-camY)*ZOOM,text,color,life:1}); }

function spawnBurst(wx,wy,color) {
  const pts=[];
  for (let i=0;i<18;i++) {
    const a=(i/18)*Math.PI*2, spd=2+Math.random()*4;
    pts.push({x:wx,y:wy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1});
  }
  bursts.push({color,pts});
}

// ── Collision ─────────────────────────────────────────────────────────────────
function circlePt(cx,cy,cr,px,py)        { const dx=cx-px,dy=cy-py; return dx*dx+dy*dy<cr*cr; }
function circleCircle(ax,ay,ar,bx,by,br) { const dx=ax-bx,dy=ay-by; return dx*dx+dy*dy<(ar+br)**2; }
function circleRect(cx,cy,cr,rx,ry,rw,rh){ const nx=Math.max(rx-rw/2,Math.min(rx+rw/2,cx)),ny=Math.max(ry-rh/2,Math.min(ry+rh/2,cy)); const dx=cx-nx,dy=cy-ny; return dx*dx+dy*dy<cr*cr; }

function resolveFurniture(ox,oy,or_) {
  for (const f of furniture) {
    const nx=Math.max(f.x-f.w/2,Math.min(f.x+f.w/2,ox));
    const ny=Math.max(f.y-f.h/2,Math.min(f.y+f.h/2,oy));
    const dx=ox-nx, dy=oy-ny, dist=Math.sqrt(dx*dx+dy*dy);
    if (dist<or_&&dist>0) { ox+=(dx/dist)*(or_-dist); oy+=(dy/dist)*(or_-dist); }
  }
  return [Math.max(or_,Math.min(MAP_W-or_,ox)), Math.max(or_,Math.min(MAP_H-or_,oy))];
}

// ── Update ────────────────────────────────────────────────────────────────────
function update() {
  frame++;
  if (state!=='playing'||paused) return;
  if (--timeLeft<=0) { saveHighScore(); state='gameover'; return; }

  if (shakeDamp>0.1) { shakeX=(Math.random()-.5)*shakeDamp*2; shakeY=(Math.random()-.5)*shakeDamp*2; shakeDamp*=0.85; }
  else { shakeX=0; shakeY=0; shakeDamp=0; }

  if (activeBoost>0) activeBoost--;
  if (activeMega>0)  activeMega--;
  if (activeHush>0)  activeHush--;

  const speed=(roomba.stuckTimer>0?0.9:(activeBoost>0?5.5:2.6));
  let vx=0, vy=0;
  if (keys['ArrowLeft'] ||keys['KeyA']||vkeys.left)  vx-=1;
  if (keys['ArrowRight']||keys['KeyD']||vkeys.right) vx+=1;
  if (keys['ArrowUp']   ||keys['KeyW']||vkeys.up)    vy-=1;
  if (keys['ArrowDown'] ||keys['KeyS']||vkeys.down)  vy+=1;
  if (vx&&vy) { vx*=0.707; vy*=0.707; }
  vx*=speed; vy*=speed;

  let [nx,ny]=resolveFurniture(roomba.x+vx,roomba.y+vy,R);
  roomba.x=nx; roomba.y=ny;
  roomba.vx=vx; roomba.vy=vy;
  roomba.angle+=0.12;
  roomba.bumpX*=0.8; roomba.bumpY*=0.8;
  updateCamera();

  const moving=vx||vy;
  if (moving) {
    const cleanR=activeMega>0?R*2.5:R-4;
    const newCells=markCleaned(roomba.x,roomba.y,cleanR);
    if (newCells>0) {
      comboTimer=90; combo=Math.min(8,combo+1); score+=newCells*combo;
      if (combo===3||combo===5||combo===8) playCombo(combo);
    }
    if (frame%4===0) dust.push({x:roomba.x+(Math.random()-.5)*R,y:roomba.y+(Math.random()-.5)*R,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,life:1});
    if (--humTimer<=0) { playHum(); humTimer=30; }
    battery=Math.max(0,battery-(activeBoost>0?0.10:0.07));
    if (battery<=0) { saveHighScore(); state='gameover'; return; }
  } else {
    if (comboTimer>0) { if (--comboTimer<=0) combo=1; }
  }

  if (roomba.stuckTimer>0) roomba.stuckTimer--;
  if (roomba.hitTimer>0)   roomba.hitTimer--;

  const dDist=Math.sqrt((roomba.x-dock.x)**2+(roomba.y-dock.y)**2);
  if (dDist<50) {
    if (battery<99.5) { battery=Math.min(100,battery+0.8); if (frame%8===0) playCharge(); }
  }
  if (battery<15&&moving&&frame%60===0) playAlarm();

  if (activeHush===0) { noise=Math.max(0,noise-(moving?0.018:0.18)); }
  else                { noise=Math.max(0,noise-(moving?0.08:0.28)); }

  if (noise>=100&&!ownerWarning) { ownerWarning=true; ownerTimer=100; playOwner(); shake(14); addPopup(MAP_W/2,MAP_H/2,'OWNER WAKING UP!!','#ff4444'); }
  if (ownerWarning) { if (--ownerTimer<=0) { saveHighScore(); state='gameover'; return; } }

  // Legos
  if (!roomba.hitTimer) {
    for (const l of legos) {
      if (l.hit) continue;
      if (circlePt(roomba.x,roomba.y,R+6,l.x,l.y)) {
        l.hit=true; lives--;
        roomba.hitTimer=100; roomba.bumpX=-vx*6; roomba.bumpY=-vy*6;
        roomba.x-=vx*8; roomba.y-=vy*8;
        shake(16); noise=Math.min(100,noise+(ownerWarning?0:32));
        addPopup(roomba.x,roomba.y-44,'OW!! LEGO!!','#ff4444'); playLego();
        if (lives<=0) { saveHighScore(); state='gameover'; return; }
        break;
      }
    }
  }

  // Socks
  for (const s of socks) {
    if (circleRect(roomba.x,roomba.y,R,s.x,s.y,42,20)&&!roomba.stuckTimer) {
      roomba.stuckTimer=180; addPopup(roomba.x,roomba.y-44,'SOCK! STUCK!','#8888ff'); playSock();
    }
  }

  // Cats
  for (const c of cats) {
    if (c.sleeping) {
      if (--c.randomWakeTimer<=0) {
        c.sleeping=false; c.awakeTimer=300;
        c.randomWakeTimer=Math.floor(420+Math.random()*360);
        noise=Math.min(100,noise+(ownerWarning?0:22));
        addPopup(c.x,c.y-50,'HISSSSS!!','#ff8800'); playCatHiss();
      } else if (circleRect(roomba.x,roomba.y,R+4,c.x,c.y,c.w+10,c.h+10)) {
        c.sleeping=false; c.awakeTimer=300;
        noise=Math.min(100,noise+(ownerWarning?0:30));
        addPopup(c.x,c.y-50,'HISSSSS!!','#ff8800'); playCatHiss();
        roomba.bumpX=-vx*10; roomba.bumpY=-vy*10;
        roomba.x-=vx*12; roomba.y-=vy*12;
      }
    } else {
      if (--c.awakeTimer<=0) { c.sleeping=true; }
      else {
        const noisePull=Math.max(0,(noise-40)/60);
        const targetX=c.patrolX+(roomba.x-c.patrolX)*noisePull;
        const targetY=c.patrolY+(roomba.y-c.patrolY)*noisePull;
        const pdx=targetX-c.x, pdy=targetY-c.y, pdist=Math.sqrt(pdx*pdx+pdy*pdy)||1;
        if (pdist<24&&noisePull<0.5) { c.patrolX=80+Math.random()*(MAP_W-160); c.patrolY=80+Math.random()*(MAP_H-160); }
        const catSpd=1.1+noisePull*1.4;
        c.x=Math.max(36,Math.min(MAP_W-36,c.x+(pdx/pdist)*catSpd));
        c.y=Math.max(23,Math.min(MAP_H-23,c.y+(pdy/pdist)*catSpd));
        if (frame%5===0) {
          const gcx=Math.floor(c.x/CELL), gcy=Math.floor(c.y/CELL);
          if (gcx>=0&&gcx<gCols&&gcy>=0&&gcy<gRows) {
            const idx=gcy*gCols+gcx;
            if (cleaned[idx]&&Math.random()<0.55) {
              cleaned[idx]=0;
              if (dirty[idx]) dirtyClean=Math.max(0,dirtyClean-1);
              mmCtx.fillStyle=dirty[idx]?'#2a1a08':'#0a0a1e';
              mmCtx.fillRect(gcx,gcy,1,1);
            }
          }
        }
        if (circleCircle(roomba.x,roomba.y,R,c.x,c.y,28)&&!roomba.hitTimer) {
          lives--; roomba.hitTimer=130; shake(10);
          c.awakeTimer=0; c.sleeping=true;
          addPopup(roomba.x,roomba.y-44,'CAT ATTACK!!','#ff4444');
          if (lives<=0) { saveHighScore(); state='gameover'; return; }
        }
      }
    }
  }

  // Dogs
  for (const d of dogs) {
    if (--d.dirTimer<=0) {
      const spd=2.8+currentLevel*0.2;
      if (Math.random()<0.30) {
        const dx=roomba.x-d.x,dy=roomba.y-d.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
        d.vx=dx/dist*spd; d.vy=dy/dist*spd;
      } else {
        const ang=Math.random()*Math.PI*2;
        d.vx=Math.cos(ang)*spd; d.vy=Math.sin(ang)*spd;
      }
      d.dirTimer=40+Math.floor(Math.random()*70);
    }
    if (d.bark>0) d.bark--;
    let [dx2,dy2]=resolveFurniture(d.x+d.vx,d.y+d.vy,d.r);
    if (Math.abs(dx2-d.x)<0.1) d.vx*=-1;
    if (Math.abs(dy2-d.y)<0.1) d.vy*=-1;
    d.x=Math.max(d.r,Math.min(MAP_W-d.r,dx2));
    d.y=Math.max(d.r,Math.min(MAP_H-d.r,dy2));
    if (d.x<=d.r||d.x>=MAP_W-d.r) d.vx*=-1;
    if (d.y<=d.r||d.y>=MAP_H-d.r) d.vy*=-1;
    if (circleCircle(roomba.x,roomba.y,R,d.x,d.y,d.r)&&!roomba.hitTimer) {
      lives--; roomba.hitTimer=120; shake(10);
      noise=Math.min(100,noise+(ownerWarning?0:15));
      addPopup(roomba.x,roomba.y-44,'DOG SLOBBER!!','#ff8800');
      playDog(); d.bark=30;
      if (lives<=0) { saveHighScore(); state='gameover'; return; }
    }
  }

  // Baby monitors
  for (const bm of babyMonitors) {
    const dist=Math.sqrt((roomba.x-bm.x)**2+(roomba.y-bm.y)**2);
    const wasActive=bm.active;
    bm.active=dist<120;
    if (bm.active) {
      noise=Math.min(100,noise+0.32);
      if (--bm.beepTimer<=0) { playBabyMon(); bm.beepTimer=50; }
      if (!wasActive) addPopup(bm.x,bm.y-44,'BABY MONITOR!','#ff88ff');
    } else {
      if (bm.beepTimer>0) bm.beepTimer=0;
    }
  }

  // Power-ups
  for (const p of powerups) {
    if (p.collected) continue;
    if (circlePt(roomba.x,roomba.y,R+14,p.x,p.y)) {
      p.collected=true; playPickup(); spawnBurst(p.x,p.y,p.color);
      if (p.effect==='boost') { activeBoost=360; addPopup(roomba.x,roomba.y-50,'BOOST!! 3X SPEED','#ffcc00'); }
      if (p.effect==='mega')  { activeMega=360;  addPopup(roomba.x,roomba.y-50,'MEGA CLEAN!!','#44aaff'); }
      if (p.effect==='hush')  { activeHush=480;  addPopup(roomba.x,roomba.y-50,'HUSH MODE ON','#44ff88'); noise=Math.max(0,noise-20); }
    }
  }

  // Win at 80%
  if (dirtyTotal>0&&dirtyClean/dirtyTotal>=0.80) {
    playLevelUp();
    saveHighScore();
    state=currentLevel>=LEVELS.length-1?'win':'levelcomplete';
  }

  dust.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.04;});
  dust=dust.filter(p=>p.life>0);
  popups.forEach(p=>{p.y-=0.8;p.life-=0.018;});
  popups=popups.filter(p=>p.life>0);
  bursts.forEach(b=>b.pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.9;p.vy*=0.9;p.life-=0.042;}));
  bursts=bursts.filter(b=>b.pts.some(p=>p.life>0));
}

// ── World-space draw ──────────────────────────────────────────────────────────
function drawRoom() {
  ctx.fillStyle='#02020a'; ctx.fillRect(0,0,MAP_W,MAP_H);
  const vw=W/ZOOM, vh=H/ZOOM;
  const vx0=Math.max(0,Math.floor(camX/CELL)), vx1=Math.min(gCols-1,Math.ceil((camX+vw)/CELL));
  const vy0=Math.max(0,Math.floor(camY/CELL)), vy1=Math.min(gRows-1,Math.ceil((camY+vh)/CELL));
  for (let cy=vy0;cy<=vy1;cy++) for (let cx=vx0;cx<=vx1;cx++) {
    const idx=cy*gCols+cx;
    if (cleaned[idx])     { ctx.fillStyle='#0e1a22'; ctx.fillRect(cx*CELL+1,cy*CELL+1,CELL-2,CELL-2); }
    else if (dirty[idx])  { ctx.fillStyle='#2a1206'; ctx.fillRect(cx*CELL+1,cy*CELL+1,CELL-2,CELL-2); }
  }
  ctx.strokeStyle='rgba(0,255,200,0.018)'; ctx.lineWidth=0.5;
  for (let x=vx0*CELL;x<=(vx1+1)*CELL;x+=CELL){ctx.beginPath();ctx.moveTo(x,camY);ctx.lineTo(x,camY+vh);ctx.stroke();}
  for (let y=vy0*CELL;y<=(vy1+1)*CELL;y+=CELL){ctx.beginPath();ctx.moveTo(camX,y);ctx.lineTo(camX+vw,y);ctx.stroke();}
  ctx.strokeStyle='#00ffcc'; ctx.lineWidth=8; ctx.globalAlpha=0.12; ctx.strokeRect(0,0,MAP_W,MAP_H); ctx.globalAlpha=1;
}

function drawDock() {
  const pulse=0.5+Math.sin(frame*0.05)*0.5;
  const low=battery<25, col=low?'#ff4400':'#00ff88';
  const charging=Math.sqrt((roomba.x-dock.x)**2+(roomba.y-dock.y)**2)<50&&battery<99.5;
  ctx.save(); ctx.translate(dock.x,dock.y);

  // Drop shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';
  roundRect(-24+3,-18+4,48,36,7); ctx.fill();

  // Station body
  ctx.fillStyle='#0e0e1e';
  roundRect(-24,-18,48,36,7); ctx.fill();
  ctx.strokeStyle=col; ctx.lineWidth=1.5+pulse;
  roundRect(-24,-18,48,36,7); ctx.stroke();

  // Inset screen panel
  ctx.fillStyle=low?'#1a0800':'#05100a';
  roundRect(-16,-11,32,22,4); ctx.fill();

  // Lightning bolt (8-point polygon)
  ctx.fillStyle=charging?`rgba(255,210,0,${0.7+Math.sin(frame*0.22)*0.3})`:col;
  ctx.save(); ctx.scale(0.78,0.78);
  ctx.beginPath();
  ctx.moveTo(4,-9);  ctx.lineTo(-1,-9);
  ctx.lineTo(-2,0);  ctx.lineTo(1,0);
  ctx.lineTo(-3,9);  ctx.lineTo(2,9);
  ctx.lineTo(3,0);   ctx.lineTo(0,0);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // Status LED — blinks while charging, pulses red when low
  ctx.fillStyle=charging?(frame%18<9?'#00ff88':'#003322'):low?(frame%30<15?'#ff4400':'#220800'):'#005522';
  ctx.beginPath(); ctx.arc(16,-10,4,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(16,-10,4,0,Math.PI*2); ctx.stroke();

  // Metal contact prongs
  ctx.fillStyle='#44445a';
  ctx.fillRect(-11,18,7,14); ctx.fillRect(4,18,7,14);
  ctx.fillStyle='#9999bb';
  ctx.fillRect(-11,29,7,3);  ctx.fillRect(4,29,7,3);

  // Battery level arc
  ctx.strokeStyle=col; ctx.lineWidth=3; ctx.globalAlpha=0.35;
  ctx.beginPath();
  ctx.arc(0,0,34,-Math.PI/2,-Math.PI/2+Math.PI*2*(battery/100));
  ctx.stroke();
  ctx.globalAlpha=1;

  // Charging sparks
  if (charging) {
    ctx.globalAlpha=0.6+Math.sin(frame*0.25)*0.35;
    ctx.strokeStyle='#ffffaa'; ctx.lineWidth=2;
    for (let i=0;i<4;i++) {
      const a=frame*0.14+i*Math.PI/2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*36,Math.sin(a)*36);
      ctx.lineTo(Math.cos(a)*46,Math.sin(a)*46);
      ctx.stroke();
    }
  }

  ctx.globalAlpha=1;
  ctx.restore();
}

function drawFurniture() {
  for (const f of furniture) {
    ctx.save(); ctx.translate(f.x,f.y);
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(-f.w/2+4,-f.h/2+4,f.w,f.h);
    ctx.fillStyle=f.c; ctx.fillRect(-f.w/2,-f.h/2,f.w,f.h);
    ctx.strokeStyle=f.r; ctx.lineWidth=2; ctx.strokeRect(-f.w/2,-f.h/2,f.w,f.h);
    ctx.fillStyle='rgba(255,255,255,0.04)'; ctx.fillRect(-f.w/2+2,-f.h/2+2,f.w-4,f.h/3);
    ctx.restore();
  }
}

function drawLegos() {
  for (const l of legos) {
    if (l.hit) continue;
    ctx.save(); ctx.translate(l.x,l.y);
    if (l.variant===0) {
      // Bright classic toy brick
      const bc=['#cc1111','#1a55cc','#cc9900','#118833'][(Math.floor(l.x*0.07+l.y*0.05))%4];
      ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(-8+2,-5+2,16,11);
      ctx.fillStyle=bc; ctx.fillRect(-8,-5,16,11);
      ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.fillRect(-8,-5,16,4);
      ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fillRect(-8,4,16,2);
      ctx.fillStyle=bc;
      ctx.beginPath();ctx.arc(-3,-8,4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(4,-8,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.beginPath();ctx.arc(-4,-9,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(3,-9,2,0,Math.PI*2);ctx.fill();
    } else if (l.variant===1) {
      // Dark hazard brick (original)
      ctx.fillStyle=l.color; ctx.fillRect(-7,-5,14,10);
      ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(-7,4,14,2); ctx.fillRect(6,-5,2,10);
      ctx.fillStyle=l.color;
      ctx.beginPath();ctx.arc(-2,-7,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(4,-7,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.25)';
      ctx.beginPath();ctx.arc(-2,-7,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(4,-7,2,0,Math.PI*2);ctx.fill();
    } else {
      // Scattered pile of pieces
      const offs=[[-5,-5,0.4],[-3,4,-0.6],[6,-2,0.9]];
      const pc=['#2a0808','#082218','#081830'];
      for (let p=0;p<3;p++) {
        ctx.save();
        ctx.translate(offs[p][0],offs[p][1]); ctx.rotate(offs[p][2]);
        ctx.fillStyle=pc[p]; ctx.fillRect(-5,-3,10,5);
        ctx.fillStyle='rgba(255,255,255,0.12)';
        ctx.beginPath();ctx.arc(-2,-4,2,0,Math.PI*2);ctx.fill();
        ctx.restore();
      }
    }
    ctx.restore();
  }
}

function drawSocks() {
  for (const s of socks) {
    ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.angle);
    if (s.variant===0) {
      // L-shaped sock silhouette
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.beginPath();ctx.moveTo(-10,1);ctx.lineTo(-3,1);ctx.lineTo(-3,-11);ctx.lineTo(3,-11);ctx.lineTo(3,1);ctx.lineTo(11,1);ctx.lineTo(11,7);ctx.lineTo(-10,7);ctx.closePath();ctx.fill();
      ctx.fillStyle=s.color;
      ctx.beginPath();ctx.moveTo(-10,0);ctx.lineTo(-3,0);ctx.lineTo(-3,-12);ctx.lineTo(3,-12);ctx.lineTo(3,0);ctx.lineTo(11,0);ctx.lineTo(11,6);ctx.lineTo(-10,6);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.28)'; ctx.fillRect(-3,-12,6,4);
      ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(6,0,5,6);
    } else if (s.variant===1) {
      // Balled-up sock
      ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath();ctx.arc(2,2,12,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=s.color; ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(0,0,8,Math.PI*0.15,Math.PI*1.1);ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.14)'; ctx.beginPath();ctx.arc(-3,-3,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.beginPath();ctx.arc(3,4,4,0,Math.PI*2);ctx.fill();
    } else {
      // Flat ellipse with stripes (original)
      ctx.fillStyle=s.color; ctx.beginPath(); ctx.ellipse(0,0,21,9,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=2;
      for (let i=-12;i<=12;i+=8){ctx.beginPath();ctx.moveTo(i,-6);ctx.lineTo(i,6);ctx.stroke();}
    }
    ctx.restore();
  }
}

function drawCats() {
  for (const c of cats) {
    ctx.save(); ctx.translate(c.x,c.y);
    if (c.sleeping) {
      ctx.rotate(c.restAngle+Math.sin(frame*0.015)*0.04);
      ctx.fillStyle='#4a3828'; ctx.beginPath(); ctx.ellipse(0,0,c.w/2,c.h/2,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#5c4535'; ctx.beginPath(); ctx.arc(c.w/2-14,-4,13,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#6e5444';
      ctx.beginPath();ctx.moveTo(c.w/2-20,-12);ctx.lineTo(c.w/2-26,-24);ctx.lineTo(c.w/2-10,-18);ctx.closePath();ctx.fill();
      ctx.strokeStyle='#3a2818';ctx.lineWidth=5;ctx.lineCap='round';
      ctx.beginPath();ctx.arc(0,8,c.w/2-10,0.2,Math.PI*1.5);ctx.stroke();
      ctx.strokeStyle='#2a1808';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(c.w/2-20,-3);ctx.lineTo(c.w/2-16,-1);ctx.stroke();
      ctx.beginPath();ctx.moveTo(c.w/2-12,-3);ctx.lineTo(c.w/2-8,-1);ctx.stroke();
      ctx.fillStyle=`rgba(180,180,255,${0.6+Math.sin(frame*0.06)*0.3})`;
      ctx.font='12px monospace';ctx.textAlign='center';
      ctx.fillText('z',c.w/2+6+Math.sin(frame*0.05)*2,-c.h/2-4+Math.sin(frame*0.04)*3);
      ctx.font='9px monospace';
      ctx.fillText('z',c.w/2+14+Math.sin(frame*0.05)*2,-c.h/2-14+Math.sin(frame*0.04+1)*3);
    } else {
      ctx.fillStyle='#4a3828';ctx.beginPath();ctx.ellipse(0,8,c.w/3,c.h/2-4,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#5c4535';ctx.beginPath();ctx.arc(0,-c.h/3,16,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#6e5444';
      const tw=Math.sin(frame*0.3)*2;
      ctx.beginPath();ctx.moveTo(-10,-c.h/3-10+tw);ctx.lineTo(-18,-c.h/3-26+tw);ctx.lineTo(-4,-c.h/3-18+tw);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(6,-c.h/3-10-tw);ctx.lineTo(14,-c.h/3-26-tw);ctx.lineTo(2,-c.h/3-18-tw);ctx.closePath();ctx.fill();
      ctx.fillStyle='#ffcc00';
      ctx.beginPath();ctx.ellipse(-6,-c.h/3+2,5,4,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(6,-c.h/3+2,5,4,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';
      ctx.beginPath();ctx.arc(-6,-c.h/3+2,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(6,-c.h/3+2,2,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
}

function drawDogs() {
  for (const d of dogs) {
    ctx.save(); ctx.translate(d.x,d.y);
    const ang=Math.atan2(d.vy,d.vx);
    ctx.rotate(ang);
    ctx.fillStyle='#8B5E3C';
    ctx.beginPath();ctx.ellipse(0,0,d.r*1.3,d.r*0.85,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#9B6E4C';
    ctx.beginPath();ctx.arc(d.r*1.1,0,d.r*0.7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#6B4E2C';
    ctx.beginPath();ctx.ellipse(d.r*1.1-4,-d.r*0.8,5,9,0.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(d.r*1.1-4,d.r*0.8,5,9,-0.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#333';ctx.beginPath();ctx.arc(d.r*1.4,-4,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(d.r*1.4,4,2,0,Math.PI*2);ctx.fill();
    const waggle=Math.sin(frame*0.3)*0.5;
    ctx.strokeStyle='#8B5E3C';ctx.lineWidth=5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-d.r*1.1,0);ctx.quadraticCurveTo(-d.r*1.8,waggle*20,-d.r*1.6,waggle*16);ctx.stroke();
    if (d.bark>0) {
      ctx.fillStyle=`rgba(255,220,0,${d.bark/30})`;
      ctx.font='bold 10px monospace';ctx.textAlign='center';
      ctx.fillText('WOOF',0,-d.r*1.5);
    }
    ctx.restore();
  }
}

function drawBabyMonitors() {
  for (const bm of babyMonitors) {
    ctx.save(); ctx.translate(bm.x,bm.y);
    if (bm.active) {
      ctx.strokeStyle=`rgba(255,120,220,${0.12+Math.sin(frame*0.07)*0.08})`;
      ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(0,0,90,0,Math.PI*2);ctx.stroke();
    }
    ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(-10+2,-14+2,20,26);
    ctx.fillStyle='#1a1a2e'; ctx.fillRect(-10,-14,20,26);
    ctx.strokeStyle='#333355';ctx.lineWidth=1.5; ctx.strokeRect(-10,-14,20,26);
    ctx.fillStyle=bm.active?`rgba(255,80,80,${0.5+Math.sin(frame*0.28)*0.5})`:'#080818';
    ctx.fillRect(-7,-11,14,12);
    ctx.strokeStyle='#444466';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(5,-14);ctx.lineTo(9,-24);ctx.stroke();
    ctx.fillStyle='#556';ctx.beginPath();ctx.arc(9,-24,2.5,0,Math.PI*2);ctx.fill();
    const ledCol=bm.active?(frame%18<9?'#ff3333':'#ff9999'):'#223322';
    ctx.fillStyle=ledCol;ctx.beginPath();ctx.arc(6,6,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function drawPowerups() {
  for (const p of powerups) {
    if (p.collected) continue;
    const pulse=0.5+Math.sin(frame*0.1+p.x)*0.5;
    ctx.save(); ctx.translate(p.x,p.y);
    ctx.globalAlpha=0.3+pulse*0.25;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.strokeStyle=p.color;ctx.lineWidth=2+pulse;
    ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 13px monospace';ctx.textAlign='center';
    ctx.fillText(p.sym,0,5);
    ctx.restore();
  }
}

function drawBursts() {
  bursts.forEach(b => {
    b.pts.forEach(p => {
      if (p.life<=0) return;
      ctx.save();
      ctx.globalAlpha=p.life*0.85;
      ctx.fillStyle=b.color;
      ctx.beginPath();ctx.arc(p.x,p.y,3.5*p.life,0,Math.PI*2);ctx.fill();
      ctx.restore();
    });
  });
}

function drawRoomba() {
  if (roomba.hitTimer>0&&Math.floor(frame/4)%2===0) return;
  const bx=roomba.x+roomba.bumpX, by=roomba.y+roomba.bumpY;
  dust.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life*0.4;
    ctx.fillStyle='#aaa';ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  if (activeMega>0) {
    ctx.save();ctx.globalAlpha=0.15+Math.sin(frame*0.1)*0.05;
    ctx.fillStyle='#44aaff';ctx.beginPath();ctx.arc(bx,by,R*2.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  ctx.save(); ctx.translate(bx,by);
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(3,5,R,R*0.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=roomba.stuckTimer>0?'#3a3000':activeBoost>0?'#1a2200':'#1e1e1e';
  ctx.beginPath();ctx.arc(0,0,R,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=roomba.stuckTimer>0?'#665500':activeBoost>0?'#88ff00':'#383838';ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(0,0,R-1,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='#555';ctx.lineWidth=4;
  ctx.beginPath();ctx.arc(0,0,R-3,-Math.PI*0.65,Math.PI*0.65);ctx.stroke();
  ctx.save();ctx.rotate(roomba.angle);ctx.lineWidth=1.5;
  for (let i=0;i<6;i++) {
    ctx.rotate(Math.PI/3);
    ctx.strokeStyle=activeBoost>0?(i%2?'#88ff00':'#44aa00'):(i%2?'#009955':'#006633');
    ctx.beginPath();ctx.moveTo(3,0);ctx.lineTo(R-8,0);ctx.stroke();
  }
  ctx.restore();
  ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#444';ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();
  const led=roomba.hitTimer>0?'#ff0000':roomba.stuckTimer>0?'#ff8800':activeBoost>0?'#88ff00':activeMega>0?'#44aaff':activeHush>0?'#44ff88':'#00ff44';
  ctx.fillStyle=led;ctx.beginPath();ctx.arc(9,-R+9,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.beginPath();ctx.arc(8,-R+8,2,0,Math.PI*2);ctx.fill();
  if (roomba.stuckTimer>0){
    ctx.strokeStyle='rgba(136,136,136,0.6)';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(0,0,R+5,frame*0.05,frame*0.05+Math.PI*1.4);ctx.stroke();
  }
  ctx.restore();
}

// ── Screen-space draw ─────────────────────────────────────────────────────────
function drawDarkness() {
  const sx=(roomba.x-camX)*ZOOM, sy=(roomba.y-camY)*ZOOM;
  const battFrac=battery/100;
  const baseR=activeMega>0?240:activeBoost>0?220:Math.max(22,28+battFrac*192+Math.sin(frame*0.03)*(3+(1-battFrac)*18));
  const lightR=baseR*ZOOM;
  const g1=ctx.createRadialGradient(sx,sy,R+8,sx,sy,lightR);
  g1.addColorStop(0,'rgba(0,0,0,0)');
  g1.addColorStop(0.5,'rgba(0,0,12,0.18)');
  g1.addColorStop(1,'rgba(0,0,12,0.97)');
  ctx.fillStyle=g1;ctx.fillRect(0,0,W,H);
  if (noise>60||ownerWarning) {
    const ownerAlpha=ownerWarning?0.15+Math.sin(frame*0.2)*0.05:(noise-60)/200;
    ctx.fillStyle=`rgba(255,240,200,${ownerAlpha})`;ctx.fillRect(0,0,W,H);
  }
  if (activeBoost>0) { ctx.fillStyle=`rgba(100,200,0,${0.04+Math.sin(frame*0.1)*0.02})`; ctx.fillRect(0,0,W,H); }
  if (activeMega>0)  { ctx.fillStyle=`rgba(50,150,255,${0.05+Math.sin(frame*0.1)*0.02})`; ctx.fillRect(0,0,W,H); }
}

function drawPopups() {
  popups.forEach(p=>{
    ctx.save();ctx.globalAlpha=Math.min(1,p.life*2);
    ctx.fillStyle=p.color;ctx.font='bold 17px monospace';ctx.textAlign='center';
    ctx.fillText(p.text,p.x,p.y);ctx.restore();
  });
}

function roundRect(cx2,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(cx2+r,y); ctx.lineTo(cx2+w-r,y);
  ctx.quadraticCurveTo(cx2+w,y,cx2+w,y+r);
  ctx.lineTo(cx2+w,y+h-r); ctx.quadraticCurveTo(cx2+w,y+h,cx2+w-r,y+h);
  ctx.lineTo(cx2+r,y+h); ctx.quadraticCurveTo(cx2,y+h,cx2,y+h-r);
  ctx.lineTo(cx2,y+r); ctx.quadraticCurveTo(cx2,y,cx2+r,y);
  ctx.closePath();
}

function drawSegBar(x,y,w,h,pct,col,segs) {
  segs=segs||20;
  const sw=Math.floor((w-segs+1)/segs);
  ctx.fillStyle='#03030e'; ctx.fillRect(x,y,w,h);
  for (let i=0;i<segs;i++) {
    if (i/segs<pct) {
      ctx.fillStyle=col; ctx.fillRect(x+i*(sw+1),y+1,sw,h-2);
      ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fillRect(x+i*(sw+1),y+1,sw,Math.ceil((h-2)/2));
    }
  }
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1; ctx.strokeRect(x,y,w,h);
}

function drawCRT() {
  ctx.save();
  for (let y=0;y<H;y+=3) { ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fillRect(0,y,W,1); }
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.88);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.48)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  ctx.restore();
}

function drawMuteButton(bx) {
  if (bx===undefined) bx=W-76;
  muteBtnX=bx;
  const by=7, bw=62, bh=22;
  ctx.save();
  ctx.fillStyle=muted?'#140000':'#00100a';
  ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle=muted?'#ff3344':'#00ffcc'; ctx.lineWidth=1;
  ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle=muted?'#ff3344':'#00ffcc';
  [[bx,by],[bx+bw,by],[bx,by+bh],[bx+bw,by+bh]].forEach(([cx,cy])=>{ ctx.fillRect(cx-1,cy-1,3,3); });
  ctx.font='bold 11px monospace'; ctx.textAlign='center';
  ctx.fillText(muted?'MUTED':'SND ON',bx+bw/2,by+15);
  ctx.restore();
}

function drawDpad() {
  const {ps,cx,cy}=getDpadLayout();
  const dirs=[
    {lbl:'▲',dx:0,dy:-1,key:'up'},{lbl:'▼',dx:0,dy:1,key:'down'},
    {lbl:'◀',dx:-1,dy:0,key:'left'},{lbl:'▶',dx:1,dy:0,key:'right'},
  ];
  for (const d of dirs) {
    const bx=cx+d.dx*ps, by=cy+d.dy*ps;
    const active=vkeys[d.key];
    ctx.save();
    ctx.globalAlpha=0.6;
    ctx.fillStyle=active?'rgba(0,255,200,0.3)':'rgba(4,4,18,0.82)';
    ctx.strokeStyle=active?'#00ffcc':'#1a2240'; ctx.lineWidth=1.5;
    roundRect(bx-ps*0.45,by-ps*0.45,ps*0.9,ps*0.9,5); ctx.fill(); ctx.stroke();
    ctx.globalAlpha=0.9;
    ctx.fillStyle=active?'#00ffcc':'#334466';
    ctx.font=`bold ${Math.floor(ps*0.44)}px sans-serif`; ctx.textAlign='center';
    ctx.fillText(d.lbl,bx,by+ps*0.18);
    ctx.restore();
  }
}

function drawHUD() {
  const lv=LEVELS[currentLevel];
  const pct=dirtyTotal>0?Math.floor((dirtyClean/dirtyTotal)*100):0;
  const charging=Math.sqrt((roomba.x-dock.x)**2+(roomba.y-dock.y)**2)<50&&battery<99.5;
  const topH=60;
  const cs=8; // corner accent size

  // ── TOP BAR ───────────────────────────────────────────────────────────────
  ctx.fillStyle='rgba(0,0,6,0.96)'; ctx.fillRect(0,0,W,topH);
  ctx.strokeStyle='rgba(0,255,200,0.2)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,topH); ctx.lineTo(W,topH); ctx.stroke();

  const progW=Math.min(620,Math.max(300,W*0.55));
  const progX=Math.floor((W-progW)/2);
  const progCX=progX+progW/2;

  // Level badge
  ctx.fillStyle='#000c10'; ctx.fillRect(progX,8,52,20);
  ctx.strokeStyle='#00ffcc'; ctx.lineWidth=1; ctx.strokeRect(progX,8,52,20);
  ctx.fillStyle='#00ffcc'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
  ctx.fillText(`LVL ${currentLevel+1}`,progX+26,22);

  // Room name
  ctx.fillStyle='#7799bb'; ctx.font='bold 13px monospace'; ctx.textAlign='left';
  ctx.fillText(lv.name,progX+62,22);

  // Segmented progress bar
  const barY=33, barH=18;
  const barCol=pct>=80?'#00ffcc':pct>=60?'#00cc88':pct>=40?'#88cc00':'#557700';
  drawSegBar(progX,barY,progW,barH,pct/100,barCol,25);
  // 80% goal marker
  ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.fillRect(progX+Math.floor(progW*0.8)-1,barY-2,2,barH+4);
  ctx.fillStyle='rgba(255,255,255,0.82)'; ctx.font='bold 10px monospace'; ctx.textAlign='center';
  ctx.fillText(`${pct}%  CLEANED`,progCX,barY+13);

  drawMuteButton(progX+progW-62);

  // ── BOTTOM-LEFT PANEL ────────────────────────────────────────────────────
  const panX=10, panW=210, panH=168, panY=H-panH-10;
  ctx.fillStyle='rgba(0,0,6,0.90)'; ctx.fillRect(panX,panY,panW,panH);
  ctx.strokeStyle='rgba(0,255,200,0.18)'; ctx.lineWidth=1; ctx.strokeRect(panX,panY,panW,panH);
  ctx.strokeStyle='#00ffcc'; ctx.lineWidth=1.5;
  [[panX,panY],[panX+panW,panY],[panX,panY+panH],[panX+panW,panY+panH]].forEach(([cx,cy])=>{
    const sx=cx===panX?1:-1,sy=cy===panY?1:-1;
    ctx.beginPath();ctx.moveTo(cx+sx*cs,cy);ctx.lineTo(cx,cy);ctx.lineTo(cx,cy+sy*cs);ctx.stroke();
  });

  ctx.textAlign='left';
  ctx.fillStyle='#6a9ab8'; ctx.font='bold 10px monospace';
  ctx.fillText('SCORE',panX+12,panY+16);
  ctx.fillStyle='#ffd700'; ctx.font='bold 22px monospace';
  ctx.fillText(String(score).padStart(6,'0'),panX+12,panY+58);
  if (combo>2) {
    ctx.fillStyle=combo>=8?'#ff3344':combo>=5?'#ff8800':'#ffdd44';
    ctx.font=`bold ${Math.min(16,9+combo)}px monospace`;
    ctx.fillText(`x${combo} COMBO`,panX+12,panY+76);
  }

  ctx.strokeStyle='rgba(0,255,200,0.08)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(panX+8,panY+84); ctx.lineTo(panX+panW-8,panY+84); ctx.stroke();

  const batPct=battery/100;
  const batC=battery<20?'#ff3344':battery<50?'#ff8800':'#00ffcc';
  ctx.fillStyle='#6a9ab8'; ctx.font='bold 10px monospace';
  ctx.fillText('BATTERY',panX+12,panY+98);
  ctx.textAlign='right';
  ctx.fillStyle=battery<20?(frame%20<10?'#ff3344':'#ff8800'):batC;
  ctx.font='bold 11px monospace';
  ctx.fillText(`${Math.floor(battery)}%${charging?' +':''}`,panX+panW-10,panY+98);
  ctx.textAlign='left';
  drawSegBar(panX+12,panY+103,panW-24,12,batPct,batC,14);

  ctx.strokeStyle='rgba(0,255,200,0.08)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(panX+8,panY+122); ctx.lineTo(panX+panW-8,panY+122); ctx.stroke();

  const noisePct=noise/100;
  const noiseC=noise>75?'#ff3344':noise>50?'#ff8800':'#88ff44';
  ctx.fillStyle='#6a9ab8'; ctx.font='bold 10px monospace';
  ctx.fillText('NOISE',panX+12,panY+136);
  ctx.textAlign='right';
  ctx.fillStyle=noise>75?(frame%16<8?'#ff3344':'#ffffff'):noiseC;
  ctx.font='bold 11px monospace';
  ctx.fillText(`${Math.floor(noise)}%`,panX+panW-10,panY+136);
  ctx.textAlign='left';
  drawSegBar(panX+12,panY+141,panW-24,12,noisePct,noiseC,14);

  if (noise>80&&!ownerWarning) {
    ctx.fillStyle=frame%18<9?'#ff3344':'#ff8800';
    ctx.font='bold 10px monospace'; ctx.textAlign='center';
    ctx.fillText('STAY QUIET!',panX+panW/2,panY+panH-5);
  }

  // ── BOTTOM-RIGHT: TIMER + LIVES ──────────────────────────────────────────
  const secs=Math.ceil(timeLeft/60), urgent=secs<30;
  const brX=W-150, brW=140, brCX=W-80;
  const brPanH=138, brY=H-brPanH-10;
  ctx.fillStyle='rgba(0,0,6,0.90)'; ctx.fillRect(brX,brY,brW,brPanH);
  ctx.strokeStyle='rgba(0,255,200,0.18)'; ctx.lineWidth=1; ctx.strokeRect(brX,brY,brW,brPanH);
  ctx.strokeStyle='#00ffcc'; ctx.lineWidth=1.5;
  [[brX,brY],[brX+brW,brY],[brX,brY+brPanH],[brX+brW,brY+brPanH]].forEach(([cx,cy])=>{
    const sx=cx===brX?1:-1,sy=cy===brY?1:-1;
    ctx.beginPath();ctx.moveTo(cx+sx*cs,cy);ctx.lineTo(cx,cy);ctx.lineTo(cx,cy+sy*cs);ctx.stroke();
  });
  ctx.textAlign='center';
  ctx.fillStyle='#6a9ab8'; ctx.font='bold 10px monospace';
  ctx.fillText('TIL DAWN',brCX,brY+22);
  ctx.fillStyle=urgent?(frame%30<15?'#ff3344':'#ff7777'):'#cce8ff';
  ctx.font=`bold ${urgent?30:26}px monospace`;
  ctx.fillText(`${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`,brCX,brY+58);
  ctx.strokeStyle='rgba(0,255,200,0.08)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(brX+10,brY+68); ctx.lineTo(brX+brW-10,brY+68); ctx.stroke();
  ctx.fillStyle='#6a9ab8'; ctx.font='bold 10px monospace';
  ctx.fillText('LIVES',brCX,brY+84);
  for (let i=0;i<3;i++) {
    const alive=i<lives;
    const lx=brCX-36+i*36, ly=brY+118;
    if (alive) {
      ctx.save(); ctx.shadowColor='#00ffcc'; ctx.shadowBlur=12;
      ctx.fillStyle='rgba(0,255,200,0.12)'; ctx.beginPath(); ctx.arc(lx,ly,16,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle=alive?'#005544':'#080814';
    ctx.beginPath(); ctx.arc(lx,ly,12,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=alive?'#00ffcc':'#181826'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(lx,ly,12,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle=alive?'#00ffcc':'#181826';
    ctx.beginPath(); ctx.arc(lx,ly,4,0,Math.PI*2); ctx.fill();
  }

  // ── DOCK ARROW ───────────────────────────────────────────────────────────
  if (battery<40) {
    const dsx=(dock.x-camX)*ZOOM, dsy=(dock.y-camY)*ZOOM;
    const ang=Math.atan2(dsy-(H/2),dsx-(W/2));
    const dist2=Math.sqrt((dsx-W/2)**2+(dsy-H/2)**2);
    const edgeX=W/2+Math.cos(ang)*Math.min(W/2-50,dist2);
    const edgeY=H/2+Math.sin(ang)*Math.min(H/2-50,dist2);
    const inView=dsx>topH&&dsx<W&&dsy>topH&&dsy<H;
    if (!inView) {
      ctx.save(); ctx.translate(edgeX,edgeY); ctx.rotate(ang);
      ctx.fillStyle=`rgba(0,255,200,${0.5+Math.sin(frame*0.1)*0.4})`;
      ctx.beginPath(); ctx.moveTo(14,0); ctx.lineTo(-8,-9); ctx.lineTo(-8,9); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#00ffcc'; ctx.font='bold 10px monospace'; ctx.textAlign='center';
      ctx.fillText('DOCK',-14,4);
      ctx.restore();
    }
  }

  // ── ACTIVE EFFECTS ────────────────────────────────────────────────────────
  let effY=topH+10;
  const drawEffect=(label,col,t)=>{
    const ew=108, eh=24;
    ctx.fillStyle='rgba(0,0,6,0.92)'; ctx.fillRect(W-ew-8,effY,ew,eh);
    ctx.strokeStyle=col; ctx.lineWidth=1; ctx.strokeRect(W-ew-8,effY,ew,eh);
    ctx.fillStyle=col; ctx.font='bold 11px monospace'; ctx.textAlign='center';
    ctx.fillText(`${label}  ${t}s`,W-ew/2-8,effY+16);
    effY+=28;
  };
  if (activeBoost>0) drawEffect('BOOST','#ffd700',Math.ceil(activeBoost/60));
  if (activeMega>0)  drawEffect('MEGA','#44aaff',Math.ceil(activeMega/60));
  if (activeHush>0)  drawEffect('HUSH','#00ffcc',Math.ceil(activeHush/60));

  // ── OWNER WARNING ─────────────────────────────────────────────────────────
  if (ownerWarning) {
    const secs2=Math.ceil(ownerTimer/60);
    ctx.fillStyle='rgba(255,20,0,0.18)'; ctx.fillRect(0,0,W,H);
    ctx.save(); ctx.shadowColor='#ff0000'; ctx.shadowBlur=28;
    ctx.textAlign='center';
    ctx.fillStyle=frame%20<10?'#ff3344':'#ffff00'; ctx.font='bold 26px monospace';
    ctx.fillText(`!! OWNER WAKING !!   ${secs2}s`,W/2,H/2-14);
    ctx.restore();
  }

  // ── CONTROLS HINT ─────────────────────────────────────────────────────────
  if (frame<480) {
    ctx.globalAlpha=Math.max(0,(480-frame)/240);
    ctx.fillStyle='#223344'; ctx.font='11px monospace'; ctx.textAlign='center';
    ctx.fillText('WASD / ARROWS  ·  DOCK TO RECHARGE  ·  B M H POWERUPS  ·  P = PAUSE  M = MUTE',W/2,H-6);
    ctx.globalAlpha=1;
  }

  if ('ontouchstart' in window) drawDpad();
}

function drawMinimap() {
  if (MAP_W<=W&&MAP_H<=H) return;
  const mmW=Math.min(140,Math.floor(W*0.11)),mmH=Math.floor(mmW*gRows/gCols);
  const mmX=W-mmW-10,mmY=H-mmH-38;
  ctx.fillStyle='rgba(0,0,8,0.88)';ctx.fillRect(mmX-2,mmY-14,mmW+4,mmH+16);
  ctx.strokeStyle='rgba(0,255,200,0.2)';ctx.lineWidth=1;ctx.strokeRect(mmX-2,mmY-14,mmW+4,mmH+16);
  ctx.fillStyle='#223344';ctx.font='8px monospace';ctx.textAlign='left';ctx.fillText('MAP',mmX,mmY-4);
  ctx.save();ctx.imageSmoothingEnabled=false;ctx.drawImage(mmCanvas,mmX,mmY,mmW,mmH);ctx.restore();
  ctx.strokeStyle='rgba(0,255,200,0.15)';ctx.lineWidth=1;ctx.strokeRect(mmX,mmY,mmW,mmH);
  ctx.fillStyle='#00ffcc';ctx.beginPath();ctx.arc(mmX+(roomba.x/MAP_W)*mmW,mmY+(roomba.y/MAP_H)*mmH,2.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,255,200,0.4)';ctx.lineWidth=0.5;
  ctx.strokeRect(mmX+(camX/MAP_W)*mmW,mmY+(camY/MAP_H)*mmH,(W/ZOOM/MAP_W)*mmW,(H/ZOOM/MAP_H)*mmH);
}

// ── Overlay screens ───────────────────────────────────────────────────────────
function drawStartScreen() {
  ctx.fillStyle='#000008'; ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='rgba(0,255,200,0.035)'; ctx.lineWidth=1;
  for(let x=0;x<=W;x+=CELL*2){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=CELL*2){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // Outer border
  const bx=32,by=28,bw=W-64,bh=H-56;
  ctx.strokeStyle='rgba(0,255,200,0.22)'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
  // Corner accents
  const cs=22;
  ctx.strokeStyle='#00ffcc'; ctx.lineWidth=2;
  [[bx,by],[bx+bw,by],[bx,by+bh],[bx+bw,by+bh]].forEach(([cx,cy])=>{
    const sx=cx===bx?1:-1,sy=cy===by?1:-1;
    ctx.beginPath();ctx.moveTo(cx+sx*cs,cy);ctx.lineTo(cx,cy);ctx.lineTo(cx,cy+sy*cs);ctx.stroke();
  });
  ctx.textAlign='center';
  const big=Math.max(30,Math.min(58,W/9));
  // Title
  ctx.save();
  ctx.shadowColor='#00ffcc'; ctx.shadowBlur=48;
  ctx.fillStyle='#00ffcc'; ctx.font=`bold ${big}px monospace`;
  ctx.fillText('OPERATION',W/2,H/2-big*1.85);
  ctx.shadowBlur=16;
  ctx.fillStyle='#ffffff'; ctx.font=`bold ${Math.floor(big*1.22)}px monospace`;
  ctx.fillText('ROOMBA',W/2,H/2-big*0.65);
  ctx.restore();
  // Divider
  const dw=Math.min(360,W*0.42);
  ctx.strokeStyle='rgba(0,255,200,0.3)'; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2-dw/2,H/2-big*0.05);ctx.lineTo(W/2+dw/2,H/2-big*0.05);ctx.stroke();
  // Tagline
  const sm=Math.max(11,Math.min(14,W/64));
  ctx.fillStyle='#2a4455'; ctx.font=`${sm}px monospace`;
  ctx.fillText('5 ROOMS  ·  3 AM  ·  ONE TINY ROBOT  ·  SURVIVE TILL DAWN',W/2,H/2+big*0.42);
  ctx.fillStyle='#551a1a'; ctx.font=`bold ${sm-1}px monospace`;
  ctx.fillText('WARNING: NOT FOR THE FAINT OF HEART',W/2,H/2+big*0.42+sm*2.4);
  // Press to play
  if(Math.floor(frame/22)%2===0){
    ctx.save(); ctx.shadowColor='#ffffff'; ctx.shadowBlur=10;
    ctx.fillStyle='#ffffff'; ctx.font=`bold ${sm+5}px monospace`;
    ctx.fillText('PRESS SPACE TO PLAY',W/2,H/2+big*2.1);
    ctx.restore();
  }
  // High score
  if(highScore>0){
    ctx.fillStyle='#1a2e3a'; ctx.font=`${sm-1}px monospace`;
    ctx.fillText('HIGH SCORE',W/2,H/2+big*2.1+sm*3.2);
    ctx.save(); ctx.shadowColor='#ffd700'; ctx.shadowBlur=8;
    ctx.fillStyle='#ffd700'; ctx.font=`bold ${sm+2}px monospace`;
    ctx.fillText(highScore.toLocaleString(),W/2,H/2+big*2.1+sm*5.2);
    ctx.restore();
  }
  drawMuteButton();
  drawCRT();
}

function drawLevelComplete() {
  ctx.fillStyle='rgba(0,0,6,0.94)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  const big=Math.max(24,Math.min(48,W/12));
  const sm=Math.max(12,Math.min(15,W/58));
  const pct=dirtyTotal>0?Math.floor((dirtyClean/dirtyTotal)*100):0;
  ctx.save();
  ctx.shadowColor='#00ffcc'; ctx.shadowBlur=32;
  ctx.fillStyle='#00ffcc'; ctx.font=`bold ${big}px monospace`;
  ctx.fillText('ROOM CLEAN!',W/2,H/2-big*1.5);
  ctx.restore();
  ctx.fillStyle='#446677'; ctx.font=`${sm}px monospace`;
  ctx.fillText(`${LEVELS[currentLevel].name}  ·  ${pct}% DIRT REMOVED`,W/2,H/2-sm*0.5);
  ctx.strokeStyle='rgba(0,255,200,0.15)'; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2-200,H/2+sm*1.8);ctx.lineTo(W/2+200,H/2+sm*1.8);ctx.stroke();
  ctx.fillStyle='#ffd700'; ctx.font=`bold ${sm+2}px monospace`;
  ctx.fillText(`SCORE  ${score.toLocaleString()}`,W/2,H/2+sm*3.5);
  if(score>=highScore&&score>0){
    ctx.fillStyle=frame%30<15?'#ffd700':'#ffffff';
    ctx.font=`bold ${sm}px monospace`;
    ctx.fillText('NEW BEST!',W/2,H/2+sm*5.2);
  }
  const next=LEVELS[currentLevel+1];
  if(next){
    ctx.fillStyle='#88aacc'; ctx.font=`bold ${sm}px monospace`;
    ctx.fillText(`NEXT:  LVL ${currentLevel+2}  —  ${next.name}`,W/2,H/2+sm*6.8);
    ctx.fillStyle='#223344'; ctx.font=`${sm-1}px monospace`;
    ctx.fillText(`${next.mapW}×${next.mapH}  ·  ${next.legos} LEGOS  ·  ${next.cats} CATS  ·  ${next.dogs} DOGS`,W/2,H/2+sm*8.4);
  }
  if(Math.floor(frame/22)%2===0){
    ctx.fillStyle='#ffffff'; ctx.font=`bold ${sm+2}px monospace`;
    ctx.fillText('PRESS SPACE TO CONTINUE',W/2,H/2+sm*10.5);
  }
  drawMuteButton();
  drawCRT();
}

function drawWin() {
  ctx.fillStyle='rgba(0,0,6,0.96)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  const big=Math.max(22,Math.min(46,W/13));
  const sm=Math.max(12,Math.min(15,W/58));
  ctx.save();
  ctx.shadowColor='#ffd700'; ctx.shadowBlur=44;
  ctx.fillStyle='#ffd700'; ctx.font=`bold ${big}px monospace`;
  ctx.fillText('THE HOUSE IS CLEAN!!',W/2,H/2-big*1.5);
  ctx.restore();
  ctx.fillStyle='#00ffcc'; ctx.font=`${sm+1}px monospace`;
  ctx.fillText('All 5 rooms. The family wakes to a spotless floor.',W/2,H/2);
  ctx.strokeStyle='rgba(255,215,0,0.15)'; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2-200,H/2+sm*1.6);ctx.lineTo(W/2+200,H/2+sm*1.6);ctx.stroke();
  ctx.fillStyle='#556677'; ctx.font=`${sm}px monospace`;
  ctx.fillText(`FINAL SCORE: ${score.toLocaleString()}`,W/2,H/2+sm*2.8);
  ctx.fillStyle='#ffd700'; ctx.font=`${sm}px monospace`;
  ctx.fillText(`BEST SCORE: ${highScore.toLocaleString()}`,W/2,H/2+sm*4.5);
  if(score>=highScore&&score>0){
    ctx.fillStyle=frame%30<15?'#ffd700':'#fff'; ctx.font=`bold ${sm+2}px monospace`;
    ctx.fillText('NEW ALL-TIME BEST!!',W/2,H/2+sm*6.2);
  }
  if(Math.floor(frame/22)%2===0){
    ctx.fillStyle='#fff'; ctx.font=`bold ${sm+2}px monospace`;
    ctx.fillText('PRESS SPACE TO PLAY AGAIN',W/2,H/2+sm*(score>=highScore&&score>0?8.5:6.5));
  }
  drawMuteButton();
  drawCRT();
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,6,0.94)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  const big=Math.max(22,Math.min(44,W/13));
  const sm=Math.max(12,Math.min(14,W/60));
  const reason=ownerWarning?'THE OWNER WOKE UP':battery<=0?'BATTERY DEAD':lives<=0?'ROOMBA DOWN':'DAWN BREAKS';
  ctx.save();
  ctx.shadowColor='#ff3344'; ctx.shadowBlur=36;
  ctx.fillStyle='#ff3344'; ctx.font=`bold ${big}px monospace`;
  ctx.fillText(reason,W/2,H/2-big*1.5);
  ctx.restore();
  const sub=ownerWarning?'Too much noise. The house is awake.':battery<=0?'The Roomba ran out of juice.':lives<=0?'Too many obstacles. The Roomba weeps.':'The sun is up.';
  ctx.fillStyle='#553333'; ctx.font=`${sm}px monospace`;
  ctx.fillText(sub,W/2,H/2-sm*0.5);
  ctx.strokeStyle='rgba(255,50,50,0.15)'; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2-200,H/2+sm*1.6);ctx.lineTo(W/2+200,H/2+sm*1.6);ctx.stroke();
  const pct=dirtyTotal>0?Math.floor((dirtyClean/dirtyTotal)*100):0;
  ctx.fillStyle='#667788'; ctx.font=`${sm}px monospace`;
  ctx.fillText(`LVL ${currentLevel+1}: ${LEVELS[currentLevel].name}  ·  ${pct}% CLEANED  ·  ${score.toLocaleString()} PTS`,W/2,H/2+sm*2.8);
  ctx.fillStyle='#ffd700'; ctx.font=`${sm}px monospace`;
  ctx.fillText(`BEST: ${highScore.toLocaleString()}`,W/2,H/2+sm*4.5);
  if(Math.floor(frame/22)%2===0){
    ctx.fillStyle='#ffffff'; ctx.font=`bold ${sm+2}px monospace`;
    ctx.fillText('PRESS SPACE TO RETRY',W/2,H/2+sm*6.5);
  }
  drawMuteButton();
  drawCRT();
}

function drawPauseOverlay() {
  ctx.fillStyle='rgba(0,0,6,0.82)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  const big=Math.max(28,Math.min(52,W/10));
  ctx.save();
  ctx.shadowColor='#00ffcc'; ctx.shadowBlur=32;
  ctx.fillStyle='#00ffcc'; ctx.font=`bold ${big}px monospace`;
  ctx.fillText('PAUSED',W/2,H/2-big*0.5);
  ctx.restore();
  const sm=Math.max(11,Math.min(14,W/64));
  ctx.fillStyle='#223344'; ctx.font=`${sm}px monospace`;
  ctx.fillText('SPACE  ·  P  ·  ESC  —  RESUME',W/2,H/2+sm*2.5);
  ctx.fillStyle=muted?'#ff3344':'#00ffcc';
  ctx.fillText(muted?'SOUND: OFF':'SOUND: ON',W/2,H/2+sm*4.5);
  ctx.fillStyle='#1a2a33'; ctx.font=`${sm-1}px monospace`;
  ctx.fillText('M  —  TOGGLE MUTE',W/2,H/2+sm*6);
  // Quit to title button
  const qbW=210, qbH=34, qbX=W/2-105, qbY=H/2+sm*9;
  _quitBtnRect={x:qbX,y:qbY,w:qbW,h:qbH};
  const qHov=mouseX>=qbX&&mouseX<=qbX+qbW&&mouseY>=qbY&&mouseY<=qbY+qbH;
  ctx.fillStyle=qHov?'rgba(120,20,20,0.97)':'rgba(50,8,8,0.92)';
  roundRect(qbX,qbY,qbW,qbH,6); ctx.fill();
  if (qHov) { ctx.save(); ctx.shadowColor='#ff3344'; ctx.shadowBlur=12; }
  ctx.strokeStyle=qHov?'#ff3344':'#882222'; ctx.lineWidth=qHov?2:1.5;
  roundRect(qbX,qbY,qbW,qbH,6); ctx.stroke();
  if (qHov) ctx.restore();
  ctx.fillStyle=qHov?'#ff6677':'#cc4444'; ctx.font=`bold ${sm}px monospace`; ctx.textAlign='center';
  ctx.fillText('QUIT TO TITLE',W/2,qbY+qbH*0.67);
  drawMuteButton();
  drawCRT();
  if (quitConfirm) drawQuitConfirm(sm);
}

function drawQuitConfirm(sm) {
  if (!sm) sm=Math.max(11,Math.min(14,W/64));
  const bxW=Math.min(400,W-60), bxH=150, bxX=W/2-Math.min(400,W-60)/2, bxY=H/2-75;
  ctx.fillStyle='rgba(0,0,10,0.97)';
  roundRect(bxX,bxY,bxW,bxH,10); ctx.fill();
  ctx.strokeStyle='#ff3344'; ctx.lineWidth=2;
  roundRect(bxX,bxY,bxW,bxH,10); ctx.stroke();
  ctx.textAlign='center';
  ctx.fillStyle='#ff4455'; ctx.font=`bold ${sm+3}px monospace`;
  ctx.fillText('QUIT TO TITLE?',W/2,bxY+36);
  ctx.fillStyle='#445566'; ctx.font=`${sm-1}px monospace`;
  ctx.fillText('You will lose your current progress.',W/2,bxY+60);
  const btnH=32, btnW=96, btnY=bxY+bxH-48;
  const yesX=W/2-btnW-14, noX=W/2+14;
  _confirmYesRect={x:yesX,y:btnY,w:btnW,h:btnH};
  _confirmNoRect ={x:noX, y:btnY,w:btnW,h:btnH};
  const yHov=mouseX>=yesX&&mouseX<=yesX+btnW&&mouseY>=btnY&&mouseY<=btnY+btnH;
  const nHov=mouseX>=noX &&mouseX<=noX+btnW &&mouseY>=btnY&&mouseY<=btnY+btnH;
  ctx.fillStyle=yHov?'rgba(160,10,10,0.97)':'rgba(100,0,0,0.9)';
  roundRect(yesX,btnY,btnW,btnH,6); ctx.fill();
  if (yHov) { ctx.save(); ctx.shadowColor='#ff3344'; ctx.shadowBlur=14; }
  ctx.strokeStyle='#ff3344'; ctx.lineWidth=yHov?2.5:1.5;
  roundRect(yesX,btnY,btnW,btnH,6); ctx.stroke();
  if (yHov) ctx.restore();
  ctx.fillStyle=yHov?'#ff8899':'#ff3344'; ctx.font=`bold ${sm+1}px monospace`;
  ctx.fillText('YES',yesX+btnW/2,btnY+btnH*0.67);
  ctx.fillStyle=nHov?'rgba(0,60,60,0.97)':'rgba(0,28,28,0.9)';
  roundRect(noX,btnY,btnW,btnH,6); ctx.fill();
  if (nHov) { ctx.save(); ctx.shadowColor='#00ffcc'; ctx.shadowBlur=14; }
  ctx.strokeStyle='#00ffcc'; ctx.lineWidth=nHov?2.5:1.5;
  roundRect(noX,btnY,btnW,btnH,6); ctx.stroke();
  if (nHov) ctx.restore();
  ctx.fillStyle=nHov?'#aaffee':'#00ffcc'; ctx.font=`bold ${sm+1}px monospace`;
  ctx.fillText('NO',noX+btnW/2,btnY+btnH*0.67);
}

// ── Main draw ─────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle='#000008';ctx.fillRect(0,0,W,H);
  if (state==='start') { drawStartScreen(); return; }

  ctx.save();
  if (shakeDamp>0.1) ctx.translate(shakeX,shakeY);
  ctx.save();
  ctx.scale(ZOOM,ZOOM);
  ctx.translate(-camX,-camY);
  drawRoom();
  drawDock();
  drawFurniture();
  drawPowerups();
  drawLegos();
  drawSocks();
  drawCats();
  drawDogs();
  drawBabyMonitors();
  drawBursts();
  drawRoomba();
  ctx.restore();
  drawDarkness();
  drawPopups();
  drawMinimap();
  ctx.restore();

  if      (state==='playing')       { drawHUD(); if (paused) drawPauseOverlay(); }
  else if (state==='levelcomplete') drawLevelComplete();
  else if (state==='win')           drawWin();
  else if (state==='gameover')      drawGameOver();
  if (state==='playing') drawCRT();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
